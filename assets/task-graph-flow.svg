<svg width="1700" height="920" viewBox="0 0 1700 920" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="920" gradientUnits="userSpaceOnUse">
    <stop stop-color="#F9FBFF"/><stop offset="1" stop-color="#EEF5FF"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#B7C7E6" flood-opacity="0.35"/>
  </filter>
</defs>
<rect width="1700" height="920" rx="34" fill="url(#bg)"/>
<text x="70" y="90" fill="#102042" font-size="44" font-family="Inter, Segoe UI, Arial" font-weight="700">Execution flow: from ambiguous task to converged branch</text>
<text x="70" y="128" fill="#4F648A" font-size="22" font-family="Inter, Segoe UI, Arial">Choose a stable work unit, prove one good slice when needed, and expand only if the branch has earned it.</text>

<g filter="url(#shadow)">
  <rect x="70" y="184" width="1560" height="292" rx="30" fill="#FFFFFF" stroke="#D7E2F4"/>
  <rect x="70" y="520" width="760" height="310" rx="30" fill="#FFFFFF" stroke="#D7E2F4"/>
  <rect x="870" y="520" width="760" height="310" rx="30" fill="#FFFFFF" stroke="#D7E2F4"/>
</g>

<rect x="108" y="252" width="198" height="126" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
<text x="138" y="298" fill="#0F2554" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">1. Task type</text>
<text x="138" y="332" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">Writing, coding,</text>
<text x="138" y="358" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">research, proof, or mixed.</text>

<rect x="366" y="252" width="226" height="126" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
<text x="396" y="298" fill="#0F2554" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">2. Real unit</text>
<text x="396" y="332" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">Chapter, feature, route,</text>
<text x="396" y="358" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">lemma, scene, or memo.</text>

<rect x="652" y="252" width="236" height="126" rx="22" fill="#FBFAFF" stroke="#D5C8FA"/>
<text x="682" y="298" fill="#372160" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">3. Calibration</text>
<text x="682" y="332" fill="#6C6590" font-size="19" font-family="Inter, Segoe UI, Arial">Pilot sample when the</text>
<text x="682" y="358" fill="#6C6590" font-size="19" font-family="Inter, Segoe UI, Arial">branch is judgment-heavy.</text>

<rect x="948" y="252" width="256" height="126" rx="22" fill="#F2FFFA" stroke="#BDE8DB"/>
<text x="978" y="298" fill="#0F766E" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">4. Readiness review</text>
<text x="978" y="332" fill="#4E7A76" font-size="19" font-family="Inter, Segoe UI, Arial">Is the quality shape stable?</text>
<text x="978" y="358" fill="#4E7A76" font-size="19" font-family="Inter, Segoe UI, Arial">Are merge surfaces understood?</text>

<rect x="1264" y="252" width="182" height="126" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
<text x="1294" y="298" fill="#0F2554" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">5. Workers</text>
<text x="1294" y="332" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">Parallel execution</text>
<text x="1294" y="358" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">under one stack.</text>

<path d="M306 315H366" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
<path d="M592 315H652" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
<path d="M888 315H948" stroke="#8B5CF6" stroke-width="8" stroke-linecap="round"/>
<path d="M1204 315H1264" stroke="#0EA5A2" stroke-width="8" stroke-linecap="round"/>

<rect x="1448" y="252" width="126" height="126" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
<text x="1474" y="298" fill="#0F2554" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">6. Close</text>
<text x="1474" y="332" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">Merge, QA,</text>
<text x="1474" y="358" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">converge.</text>
<path d="M1446 315H1448" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>

<text x="106" y="578" fill="#DB2777" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">If the branch is not ready</text>
<text x="106" y="618" fill="#5D7397" font-size="21" font-family="Inter, Segoe UI, Arial">Do not force bulk execution. Stay in a smaller loop until the branch can consistently hold the quality bar.</text>

<rect x="106" y="664" width="302" height="122" rx="22" fill="#FFF7FB" stroke="#F1C6DD"/>
<text x="134" y="710" fill="#7A1745" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Continue calibration</text>
<text x="134" y="744" fill="#93637C" font-size="18" font-family="Inter, Segoe UI, Arial">Keep working unit-by-unit</text>
<text x="134" y="768" fill="#93637C" font-size="18" font-family="Inter, Segoe UI, Arial">until the output shape stabilizes.</text>

<rect x="450" y="664" width="330" height="122" rx="22" fill="#FFF7FB" stroke="#F1C6DD"/>
<text x="478" y="710" fill="#7A1745" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Or refresh the graph</text>
<text x="478" y="744" fill="#93637C" font-size="18" font-family="Inter, Segoe UI, Arial">If the route is structurally wrong,</text>
<text x="478" y="768" fill="#93637C" font-size="18" font-family="Inter, Segoe UI, Arial">change the graph instead of patching forever.</text>

<text x="906" y="578" fill="#0F766E" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">If the branch is ready</text>
<text x="906" y="618" fill="#5D7397" font-size="21" font-family="Inter, Segoe UI, Arial">Expand only after standards, evidence discipline, and merge-sensitive surfaces are understood well enough.</text>

<rect x="906" y="664" width="294" height="122" rx="22" fill="#F2FFFA" stroke="#BDE8DB"/>
<text x="934" y="710" fill="#0F766E" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Worker execution</text>
<text x="934" y="744" fill="#4E7A76" font-size="18" font-family="Inter, Segoe UI, Arial">Every worker reports standards,</text>
<text x="934" y="768" fill="#4E7A76" font-size="18" font-family="Inter, Segoe UI, Arial">evidence, and structural risks.</text>

<rect x="1240" y="664" width="340" height="122" rx="22" fill="#F2FFFA" stroke="#BDE8DB"/>
<text x="1268" y="710" fill="#0F766E" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Merge and convergence</text>
<text x="1268" y="744" fill="#4E7A76" font-size="18" font-family="Inter, Segoe UI, Arial">Run the right review nodes, then</text>
<text x="1268" y="768" fill="#4E7A76" font-size="18" font-family="Inter, Segoe UI, Arial">merge, harmonize, and close cleanly.</text>
</svg>