<text x="80" y="90" fill="white" font-size="42" font-family="Inter, Segoe UI, Arial" font-weight="700">Execution flow: from ambiguous task to converged result</text>
<text x="80" y="130" fill="#A8BFE3" font-size="22" font-family="Inter, Segoe UI, Arial">The graph chooses a stable unit, calibrates one sample, and only then expands into parallel execution and merge discipline.</text>
