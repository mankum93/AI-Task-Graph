<text x="214" y="526" fill="#DDE8FF" font-size="21" font-family="Inter, Segoe UI, Arial">QA_GATE</text>
<text x="214" y="556" fill="#DDE8FF" font-size="21" font-family="Inter, Segoe UI, Arial">DEEP_RESEARCH_AUDIT</text>
<text x="214" y="586" fill="#DDE8FF" font-size="21" font-family="Inter, Segoe UI, Arial">MERGE_REVIEW / HARMONIZATION</text>
<text x="582" y="486" fill="url(#violet)" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Writing-aware QA</text>
<text x="582" y="526" fill="#DDE8FF" font-size="21" font-family="Inter, Segoe UI, Arial">Detemplatization</text>
<text x="582" y="556" fill="#DDE8FF" font-size="21" font-family="Inter, Segoe UI, Arial">Integration vs addendum</text>
<text x="582" y="586" fill="#DDE8FF" font-size="21" font-family="Inter, Segoe UI, Arial">Capability drift / coherence</text>
<text x="950" y="486" fill="url(#violet)" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Convergence logic</text>
<text x="950" y="526" fill="#DDE8FF" font-size="21" font-family="Inter, Segoe UI, Arial">Patch locally when issues are small</text>
<text x="950" y="556" fill="#DDE8FF" font-size="21" font-family="Inter, Segoe UI, Arial">Refresh the graph when the problem is structural</text>
<text x="950" y="586" fill="#DDE8FF" font-size="21" font-family="Inter, Segoe UI, Arial">Restart from a smaller calibrated unit when scale degrades quality</text>
