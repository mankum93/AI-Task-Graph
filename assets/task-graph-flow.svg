oe UI,Arial" font-size="12.00" fill="#0f766e">Run the right review nodes, then</text><text text-anchor="start" x="1048" y="-497.4" font-family="Inter,Segoe UI,Arial" font-size="12.00" fill="#0f766e">merge, harmonize, and close cleanly.</text></g></g></svg>