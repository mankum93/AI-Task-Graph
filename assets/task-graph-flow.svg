<svg width="1700" height="980" viewBox="0 0 1700 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFCFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="topBand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#B7C7E6" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1700" height="980" rx="34" fill="url(#bg)"/>
  <rect x="56" y="54" width="1588" height="150" rx="26" fill="url(#topBand)" stroke="#D7E2F4"/>
  <text x="88" y="110" fill="#102042" font-size="44" font-family="Inter,Segoe UI,Arial" font-weight="700">Execution flow: from ambiguous task to converged branch</text>
  <text x="88" y="146" fill="#4F648A" font-size="22" font-family="Inter,Segoe UI,Arial">Choose a stable work unit, prove one good slice when needed, and expand only if the branch has earned it.</text>
  <rect x="88" y="164" width="322" height="28" rx="14" fill="#FFFFFF" stroke="#C6D7F0"/>
  <text x="114" y="183" fill="#5D7397" font-size="16" font-family="Inter,Segoe UI,Arial">Structural rule: expand or refresh only after branch health is known.</text>

  <g filter="url(#shadow)">
    <rect x="56" y="246" width="1588" height="238" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
    <rect x="56" y="530" width="760" height="360" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
    <rect x="884" y="530" width="760" height="360" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
  </g>

  <text x="84" y="292" fill="#7C3AED" font-size="28" font-family="Inter,Segoe UI,Arial" font-weight="700">Main branch progression</text>

  <rect x="84" y="332" width="204" height="104" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="112" y="372" fill="#0F2554" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">1. Task type</text>
  <text x="112" y="402" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Writing, coding,</text>
  <text x="112" y="426" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">research, proof, or mixed.</text>

  <rect x="338" y="332" width="228" height="104" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="366" y="372" fill="#0F2554" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">2. Real unit</text>
  <text x="366" y="402" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Chapter, feature, route,</text>
  <text x="366" y="426" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">lemma, scene, or memo.</text>

  <rect x="616" y="332" width="230" height="104" rx="22" fill="#FBFAFF" stroke="#D8C8FA"/>
  <text x="644" y="372" fill="#372160" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">3. Calibration</text>
  <text x="644" y="402" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">Pilot sample when the branch</text>
  <text x="644" y="426" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">is judgment-heavy.</text>

  <rect x="896" y="332" width="256" height="104" rx="22" fill="#F2FFFA" stroke="#BDE8DB"/>
  <text x="924" y="372" fill="#0F766E" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">4. Readiness review</text>
  <text x="924" y="402" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">Is the quality shape stable?</text>
  <text x="924" y="426" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">Are merge surfaces understood?</text>

  <rect x="1202" y="332" width="178" height="104" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="1230" y="372" fill="#0F2554" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">5. Workers</text>
  <text x="1230" y="402" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Parallel execution</text>
  <text x="1230" y="426" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">under one stack.</text>

  <rect x="1430" y="332" width="140" height="104" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="1458" y="372" fill="#0F2554" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">6. Close</text>
  <text x="1458" y="402" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Merge, QA,</text>
  <text x="1458" y="426" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">converge.</text>

  <path d="M288 384H338" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
  <path d="M566 384H616" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
  <path d="M846 384H896" stroke="#8B5CF6" stroke-width="8" stroke-linecap="round"/>
  <path d="M1152 384H1202" stroke="#0EA5A2" stroke-width="8" stroke-linecap="round"/>
  <path d="M1380 384H1430" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>

  <path d="M1024 436V500" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>
  <path d="M1024 500H428" stroke="#94A3B8" stroke-width="4" stroke-dasharray="7 8" stroke-linecap="round"/>
  <path d="M428 500V530" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>
  <path d="M1024 500V530" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>

  <text x="84" y="582" fill="#DB2777" font-size="30" font-family="Inter,Segoe UI,Arial" font-weight="700">If the branch is not ready</text>
  <text x="84" y="618" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Do not force bulk execution. Stay in a smaller loop until the branch can consistently hold the quality bar.</text>
  <rect x="84" y="654" width="308" height="118" rx="22" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="110" y="698" fill="#7A1745" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Continue calibration</text>
  <text x="110" y="730" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">Keep working unit by unit until the</text>
  <text x="110" y="754" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">output shape stabilizes.</text>

  <rect x="432" y="654" width="348" height="118" rx="22" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="458" y="698" fill="#7A1745" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Or refresh the graph</text>
  <text x="458" y="730" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">If the route is structurally wrong, change</text>
  <text x="458" y="754" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">the graph instead of patching forever.</text>

  <text x="912" y="582" fill="#0F766E" font-size="30" font-family="Inter,Segoe UI,Arial" font-weight="700">If the branch is ready</text>
  <text x="912" y="618" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Expand only after standards, evidence discipline, and merge-sensitive surfaces are understood well enough.</text>
  <rect x="912" y="654" width="300" height="118" rx="22" fill="#F2FFFA" stroke="#BDE8DB"/>
  <text x="938" y="698" fill="#0F766E" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Worker execution</text>
  <text x="938" y="730" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">Every worker reports standards,</text>
  <text x="938" y="754" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">evidence, and structural risks.</text>

  <rect x="1252" y="654" width="332" height="118" rx="22" fill="#F2FFFA" stroke="#BDE8DB"/>
  <text x="1278" y="698" fill="#0F766E" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Merge and convergence</text>
  <text x="1278" y="730" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">Run the right review nodes, then merge,</text>
  <text x="1278" y="754" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">harmonize, and close cleanly.</text>

  <rect x="84" y="806" width="1500" height="48" rx="18" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="110" y="837" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Branch rule: if the graph proves one unit well, then scale. If the graph reveals structural weakness, refresh before multiplying the damage.</text>
</svg>