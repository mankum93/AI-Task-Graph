<svg width="1700" height="860" viewBox="0 0 1700 860" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="860" gradientUnits="userSpaceOnUse">
    <stop stop-color="#07111D"/><stop offset="1" stop-color="#112742"/>
  </linearGradient>
  <linearGradient id="lineA" x1="0" y1="0" x2="1" y2="0">
    <stop stop-color="#67E8F9"/><stop offset="1" stop-color="#60A5FA"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
  </filter>
</defs>
<rect width="1700" height="860" rx="32" fill="url(#bg)"/>
<text x="70" y="88" fill="white" font-size="44" font-family="Inter, Segoe UI, Arial" font-weight="700">Execution flow: from ambiguous task to converged branch</text>
<text x="70" y="126" fill="#AFC4E4" font-size="22" font-family="Inter, Segoe UI, Arial">The graph chooses a stable work unit, proves one good slice when needed, then expands only if the branch has earned it.</text>

<g filter="url(#shadow)">
  <rect x="70" y="184" width="1560" height="276" rx="30" fill="#0E1A30" stroke="#28456F"/>
  <rect x="70" y="504" width="760" height="278" rx="30" fill="#0E1A30" stroke="#28456F"/>
  <rect x="870" y="504" width="760" height="278" rx="30" fill="#0E1A30" stroke="#28456F"/>
</g>

<rect x="106" y="246" width="190" height="118" rx="22" fill="#132440" stroke="#2B5B88"/>
<text x="136" y="290" fill="#E8F0FF" font-size="25" font-family="Inter, Segoe UI, Arial" font-weight="700">1. Task type</text>
<text x="136" y="324" fill="#C8D9F1" font-size="19" font-family="Inter, Segoe UI, Arial">Writing, coding, research,</text>
<text x="136" y="350" fill="#C8D9F1" font-size="19" font-family="Inter, Segoe UI, Arial">proof, or mixed.</text>

<rect x="350" y="246" width="220" height="118" rx="22" fill="#132440" stroke="#2B5B88"/>
<text x="382" y="290" fill="#E8F0FF" font-size="25" font-family="Inter, Segoe UI, Arial" font-weight="700">2. Real unit</text>
<text x="382" y="324" fill="#C8D9F1" font-size="19" font-family="Inter, Segoe UI, Arial">Chapter, feature, route</text>
<text x="382" y="350" fill="#C8D9F1" font-size="19" font-family="Inter, Segoe UI, Arial">family, lemma, or scene.</text>

<rect x="624" y="246" width="232" height="118" rx="22" fill="#18223F" stroke="#6A52A4"/>
<text x="656" y="290" fill="#F0E9FF" font-size="25" font-family="Inter, Segoe UI, Arial" font-weight="700">3. Calibration</text>
<text x="656" y="324" fill="#D9CDF9" font-size="19" font-family="Inter, Segoe UI, Arial">Pilot sample if the branch</text>
<text x="656" y="350" fill="#D9CDF9" font-size="19" font-family="Inter, Segoe UI, Arial">is judgment-heavy.</text>

<rect x="910" y="246" width="244" height="118" rx="22" fill="#15253A" stroke="#2B6D7A"/>
<text x="942" y="290" fill="#E7FFF7" font-size="25" font-family="Inter, Segoe UI, Arial" font-weight="700">4. Readiness review</text>
<text x="942" y="324" fill="#C6EFE8" font-size="19" font-family="Inter, Segoe UI, Arial">Ask if the quality shape and</text>
<text x="942" y="350" fill="#C6EFE8" font-size="19" font-family="Inter, Segoe UI, Arial">merge surfaces are now stable.</text>

<rect x="1208" y="246" width="184" height="118" rx="22" fill="#132440" stroke="#2B5B88"/>
<text x="1238" y="290" fill="#E8F0FF" font-size="25" font-family="Inter, Segoe UI, Arial" font-weight="700">5. Workers</text>
<text x="1238" y="324" fill="#C8D9F1" font-size="19" font-family="Inter, Segoe UI, Arial">Parallel execution</text>
<text x="1238" y="350" fill="#C8D9F1" font-size="19" font-family="Inter, Segoe UI, Arial">under one stack.</text>

<rect x="1446" y="246" width="148" height="118" rx="22" fill="#132440" stroke="#2B5B88"/>
<text x="1474" y="290" fill="#E8F0FF" font-size="25" font-family="Inter, Segoe UI, Arial" font-weight="700">6. Close</text>
<text x="1474" y="324" fill="#C8D9F1" font-size="19" font-family="Inter, Segoe UI, Arial">Merge, QA,</text>
<text x="1474" y="350" fill="#C8D9F1" font-size="19" font-family="Inter, Segoe UI, Arial">converge.</text>

<path d="M296 304H350" stroke="url(#lineA)" stroke-width="8" stroke-linecap="round"/>
<path d="M570 304H624" stroke="url(#lineA)" stroke-width="8" stroke-linecap="round"/>
<path d="M856 304H910" stroke="url(#lineA)" stroke-width="8" stroke-linecap="round"/>
<path d="M1154 304H1208" stroke="url(#lineA)" stroke-width="8" stroke-linecap="round"/>
<path d="M1392 304H1446" stroke="url(#lineA)" stroke-width="8" stroke-linecap="round"/>

<text x="106" y="562" fill="#F472B6" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">If the branch is not ready</text>
<text x="106" y="602" fill="#D3E0F6" font-size="21" font-family="Inter, Segoe UI, Arial">Do not force bulk execution. Stay in a smaller loop until the branch proves it can hold the quality bar.</text>
<rect x="106" y="640" width="300" height="100" rx="20" fill="#2A1830" stroke="#8B4D87"/>
<text x="134" y="680" fill="#FFE6F5" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Continue calibration</text>
<text x="134" y="712" fill="#F2CCE5" font-size="18" font-family="Inter, Segoe UI, Arial">Keep working unit-by-unit</text>
<text x="134" y="736" fill="#F2CCE5" font-size="18" font-family="Inter, Segoe UI, Arial">until the output shape stabilizes.</text>

<rect x="454" y="640" width="320" height="100" rx="20" fill="#291B2A" stroke="#7A5A7E"/>
<text x="482" y="680" fill="#FFF0F6" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Or refresh the graph</text>
<text x="482" y="712" fill="#E7D6E7" font-size="18" font-family="Inter, Segoe UI, Arial">If the route is structurally wrong,</text>
<text x="482" y="736" fill="#E7D6E7" font-size="18" font-family="Inter, Segoe UI, Arial">change the graph instead of patching forever.</text>

<text x="906" y="562" fill="#67E8F9" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">If the branch is ready</text>
<text x="906" y="602" fill="#D3E0F6" font-size="21" font-family="Inter, Segoe UI, Arial">Expand only after the standards stack, evidence discipline, and merge-sensitive surfaces are understood.</text>
<rect x="906" y="640" width="280" height="100" rx="20" fill="#132440" stroke="#2B5B88"/>
<text x="936" y="680" fill="#E8F0FF" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Worker execution</text>
<text x="936" y="712" fill="#C8D9F1" font-size="18" font-family="Inter, Segoe UI, Arial">Every worker reports standards,</text>
<text x="936" y="736" fill="#C8D9F1" font-size="18" font-family="Inter, Segoe UI, Arial">evidence, and structural risks.</text>

<rect x="1226" y="640" width="348" height="100" rx="20" fill="#11243B" stroke="#2A6F78"/>
<text x="1254" y="680" fill="#E8FFF9" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Merge and final convergence</text>
<text x="1254" y="712" fill="#C6EFE8" font-size="18" font-family="Inter, Segoe UI, Arial">Run the right review nodes, then merge,</text>
<text x="1254" y="736" fill="#C6EFE8" font-size="18" font-family="Inter, Segoe UI, Arial">harmonize, and close the branch cleanly.</text>
</svg>