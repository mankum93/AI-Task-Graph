<text x="118" y="246" fill="#E6F0FF" font-size="26" font-family="Inter, Segoe UI, Arial" font-weight="700">Task typing</text>
<text x="118" y="278" fill="#AFC5E8" font-size="19" font-family="Inter, Segoe UI, Arial">Writing, coding,</text>
<text x="118" y="304" fill="#AFC5E8" font-size="19" font-family="Inter, Segoe UI, Arial">research, visual, mixed</text>
<text x="384" y="246" fill="#E6F0FF" font-size="26" font-family="Inter, Segoe UI, Arial" font-weight="700">Fundamental unit</text>
<text x="384" y="278" fill="#AFC5E8" font-size="19" font-family="Inter, Segoe UI, Arial">Chapter, feature, proof,</text>
<text x="384" y="304" fill="#AFC5E8" font-size="19" font-family="Inter, Segoe UI, Arial">scene, decision memo</text>
<text x="672" y="246" fill="#E6F0FF" font-size="26" font-family="Inter, Segoe UI, Arial" font-weight="700">Pilot sample</text>
<text x="672" y="278" fill="#AFC5E8" font-size="19" font-family="Inter, Segoe UI, Arial">One representative unit</text>
<text x="672" y="304" fill="#AFC5E8" font-size="19" font-family="Inter, Segoe UI, Arial">to prove the quality shape</text>
<text x="982" y="246" fill="#E6F0FF" font-size="26" font-family="Inter, Segoe UI, Arial" font-weight="700">Scale readiness</text>
<text x="982" y="278" fill="#AFC5E8" font-size="19" font-family="Inter, Segoe UI, Arial">Review if the sample is</text>
<text x="982" y="304" fill="#AFC5E8" font-size="19" font-family="Inter, Segoe UI, Arial">safe to fan out</text>
<text x="1286" y="246" fill="#E6F0FF" font-size="26" font-family="Inter, Segoe UI, Arial" font-weight="700">Parallel execution</text>
<text x="1286" y="278" fill="#AFC5E8" font-size="19" font-family="Inter, Segoe UI, Arial">Workers run ready nodes</text>
<text x="1286" y="304" fill="#AFC5E8" font-size="19" font-family="Inter, Segoe UI, Arial">under shared standards</text>
