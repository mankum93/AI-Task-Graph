<svg width="1800" height="980" viewBox="0 0 1800 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFCFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#B7C7E6" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1800" height="980" rx="34" fill="url(#bg)"/>
  <rect x="56" y="54" width="1688" height="132" rx="26" fill="url(#band)" stroke="#D7E2F4"/>
  <text x="88" y="104" fill="#102042" font-size="42" font-family="Inter,Segoe UI,Arial" font-weight="700">Node system</text>
  <text x="88" y="138" fill="#4F648A" font-size="21" font-family="Inter,Segoe UI,Arial">Combine execution nodes, calibration nodes, review gates, and graph-control nodes according to the dominant branch risk.</text>

  <g filter="url(#shadow)">
    <rect x="56" y="226" width="392" height="660" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
    <rect x="490" y="226" width="392" height="660" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
    <rect x="924" y="226" width="392" height="660" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
    <rect x="1358" y="226" width="386" height="660" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
  </g>

  <text x="84" y="284" fill="#2563EB" font-size="28" font-family="Inter,Segoe UI,Arial" font-weight="700">Execution and synthesis</text>
  <rect x="84" y="304" width="140" height="28" rx="14" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="108" y="323" fill="#2C4D93" font-size="15" font-family="Inter,Segoe UI,Arial">Do the work</text>
  <rect x="84" y="352" width="336" height="90" rx="20" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="110" y="390" fill="#0F2554" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">EXECUTION</text>
  <text x="110" y="420" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Draft, implement, prove, research, or synthesize.</text>
  <text x="110" y="444" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">This is the substantive work node.</text>
  <text x="84" y="494" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Every execution node should report consulted standards,</text>
  <text x="84" y="518" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">evidence used, merge-sensitive surfaces, and structural risks.</text>
  <rect x="84" y="570" width="336" height="236" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="110" y="612" fill="#2563EB" font-size="23" font-family="Inter,Segoe UI,Arial" font-weight="700">Use when</text>
  <text x="110" y="648" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">The branch already knows enough about its</text>
  <text x="110" y="672" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">standards stack, real unit, and risk profile</text>
  <text x="110" y="696" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">to do real work instead of more calibration.</text>
  <text x="110" y="738" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Examples: implement a slice, draft a chapter,</text>
  <text x="110" y="762" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">prove a lemma, or produce a grounded synthesis.</text>

  <text x="518" y="284" fill="#7C3AED" font-size="28" font-family="Inter,Segoe UI,Arial" font-weight="700">Calibration</text>
  <rect x="518" y="304" width="154" height="28" rx="14" fill="#FBFAFF" stroke="#D8C8FA"/>
  <text x="542" y="323" fill="#6B46C1" font-size="15" font-family="Inter,Segoe UI,Arial">Prove shape first</text>
  <rect x="518" y="352" width="336" height="78" rx="20" fill="#FBFAFF" stroke="#D8C8FA"/>
  <text x="544" y="388" fill="#372160" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">PILOT_SAMPLE</text>
  <text x="544" y="416" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">Generate one representative, judgeable unit.</text>
  <rect x="518" y="450" width="336" height="78" rx="20" fill="#FBFAFF" stroke="#D8C8FA"/>
  <text x="544" y="486" fill="#372160" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">SCALE_OUT_READINESS_REVIEW</text>
  <text x="544" y="514" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">Ask whether one good unit predicts many.</text>
  <rect x="518" y="570" width="336" height="236" rx="22" fill="#FBFAFF" stroke="#D8C8FA"/>
  <text x="544" y="612" fill="#7C3AED" font-size="23" font-family="Inter,Segoe UI,Arial" font-weight="700">Use when</text>
  <text x="544" y="648" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">Success depends heavily on judgment, pedagogy,</text>
  <text x="544" y="672" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">architecture feel, API taste, or whether the</text>
  <text x="544" y="696" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">output shape can survive repetition.</text>
  <text x="544" y="738" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">These nodes block unsafe fan-out until the</text>
  <text x="544" y="762" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">branch has actually earned broader execution.</text>

  <text x="952" y="284" fill="#0F766E" font-size="28" font-family="Inter,Segoe UI,Arial" font-weight="700">Review and research</text>
  <rect x="952" y="304" width="148" height="28" rx="14" fill="#F2FFFA" stroke="#BDE8DB"/>
  <text x="976" y="323" fill="#0F766E" font-size="15" font-family="Inter,Segoe UI,Arial">Check and ground</text>
  <rect x="952" y="352" width="336" height="72" rx="20" fill="#F2FFFA" stroke="#BDE8DB"/>
  <text x="978" y="386" fill="#0F766E" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">QA_GATE</text>
  <text x="978" y="412" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">Check correctness, integrity, and branch health.</text>
  <rect x="952" y="440" width="336" height="72" rx="20" fill="#F2FFFA" stroke="#BDE8DB"/>
  <text x="978" y="474" fill="#0F766E" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">DEEP_RESEARCH_AUDIT</text>
  <text x="978" y="500" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">Ground reality-dependent work before synthesis.</text>
  <rect x="952" y="528" width="336" height="72" rx="20" fill="#F2FFFA" stroke="#BDE8DB"/>
  <text x="978" y="562" fill="#0F766E" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">MERGE_REVIEW and HARMONIZATION</text>
  <text x="978" y="588" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">Ask whether outputs actually combine cleanly.</text>
  <rect x="952" y="628" width="336" height="178" rx="22" fill="#F2FFFA" stroke="#BDE8DB"/>
  <text x="978" y="670" fill="#0F766E" font-size="23" font-family="Inter,Segoe UI,Arial" font-weight="700">What these stop</text>
  <text x="978" y="706" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">Elegant-looking failure from being mistaken</text>
  <text x="978" y="730" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">for branch health. They test correctness,</text>
  <text x="978" y="754" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">grounding, and composability before closure.</text>

  <text x="1386" y="284" fill="#DB2777" font-size="28" font-family="Inter,Segoe UI,Arial" font-weight="700">Graph control and safeguards</text>
  <rect x="1386" y="304" width="176" height="28" rx="14" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="1410" y="323" fill="#BE185D" font-size="15" font-family="Inter,Segoe UI,Arial">Structural control</text>
  <rect x="1386" y="352" width="328" height="72" rx="20" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="1412" y="386" fill="#7A1745" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">GRAPH_REFRESH</text>
  <text x="1412" y="412" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">Change the graph when the route itself is wrong.</text>
  <rect x="1386" y="440" width="328" height="72" rx="20" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="1412" y="474" fill="#7A1745" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">PATCH_REGRESSION_QA</text>
  <text x="1412" y="500" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">Catch damage introduced by local patches.</text>
  <rect x="1386" y="528" width="328" height="72" rx="20" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="1412" y="562" fill="#7A1745" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">REWRITE_VS_PATCH_DECISION</text>
  <text x="1412" y="588" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">Choose recomposition when patching is no longer sane.</text>
  <rect x="1386" y="628" width="328" height="178" rx="22" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="1412" y="670" fill="#DB2777" font-size="23" font-family="Inter,Segoe UI,Arial" font-weight="700">Also hosts safeguards</text>
  <text x="1412" y="706" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">This family carries DETEMPLATIZATION_QA,</text>
  <text x="1412" y="730" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">ADDENDUM_INTEGRATION_QA, and other</text>
  <text x="1412" y="754" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">whole-branch safeguards when the domain needs them.</text>
</svg>