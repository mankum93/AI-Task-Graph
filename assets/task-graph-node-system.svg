<svg width="1700" height="1040" viewBox="0 0 1700 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="1040" gradientUnits="userSpaceOnUse">
    <stop stop-color="#F9FBFF"/><stop offset="1" stop-color="#EEF5FF"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#B7C7E6" flood-opacity="0.35"/>
  </filter>
</defs>
<rect width="1700" height="1040" rx="34" fill="url(#bg)"/>
<text x="72" y="92" fill="#102042" font-size="44" font-family="Inter, Segoe UI, Arial" font-weight="700">Node system</text>
<text x="72" y="130" fill="#4F648A" font-size="22" font-family="Inter, Segoe UI, Arial">Combine execution nodes, calibration nodes, review gates, and graph-control nodes according to the dominant branch risk.</text>

<g filter="url(#shadow)">
  <rect x="70" y="184" width="360" height="736" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
  <rect x="460" y="184" width="360" height="736" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
  <rect x="850" y="184" width="360" height="736" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
  <rect x="1240" y="184" width="390" height="736" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
</g>

<text x="102" y="242" fill="#2563EB" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">Execution and synthesis</text>
<rect x="102" y="278" width="296" height="86" rx="18" fill="#F8FBFF" stroke="#CFE0F6"/>
<text x="130" y="330" fill="#0F2554" font-size="23" font-family="Inter, Segoe UI, Arial">EXECUTION</text>
<rect x="102" y="388" width="296" height="190" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
<text x="128" y="430" fill="#5D7397" font-size="20" font-family="Inter, Segoe UI, Arial">Do substantive work: draft, implement,</text>
<text x="128" y="458" fill="#5D7397" font-size="20" font-family="Inter, Segoe UI, Arial">prove, research, or synthesize.</text>
<text x="128" y="500" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">It should report consulted standards,</text>
<text x="128" y="528" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">evidence, merge-sensitive surfaces,</text>
<text x="128" y="556" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">and structural risks.</text>

<rect x="102" y="614" width="296" height="258" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
<text x="128" y="656" fill="#2563EB" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Use when</text>
<text x="128" y="692" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">The branch already knows enough</text>
<text x="128" y="720" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">about its standards stack, real unit,</text>
<text x="128" y="748" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">and risk profile to do real work.</text>
<text x="128" y="790" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">Examples: implement a slice, draft a</text>
<text x="128" y="818" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">chapter, prove a lemma, or produce</text>
<text x="128" y="846" fill="#5D7397" font-size="19" font-family="Inter, Segoe UI, Arial">an evidence-backed synthesis.</text>

<text x="492" y="242" fill="#7C3AED" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">Calibration</text>
<rect x="492" y="278" width="296" height="86" rx="18" fill="#FBFAFF" stroke="#D5C8FA"/>
<text x="520" y="330" fill="#372160" font-size="23" font-family="Inter, Segoe UI, Arial">PILOT_SAMPLE</text>
<rect x="492" y="388" width="296" height="86" rx="18" fill="#FBFAFF" stroke="#D5C8FA"/>
<text x="520" y="440" fill="#372160" font-size="23" font-family="Inter, Segoe UI, Arial">SCALE_OUT_READINESS_REVIEW</text>
<rect x="492" y="500" width="296" height="156" rx="22" fill="#FBFAFF" stroke="#D5C8FA"/>
<text x="518" y="542" fill="#6C6590" font-size="20" font-family="Inter, Segoe UI, Arial">Decide whether one good sample</text>
<text x="518" y="570" fill="#6C6590" font-size="20" font-family="Inter, Segoe UI, Arial">exists and whether the branch has</text>
<text x="518" y="598" fill="#6C6590" font-size="20" font-family="Inter, Segoe UI, Arial">earned broader execution yet.</text>

<rect x="492" y="692" width="296" height="180" rx="22" fill="#FBFAFF" stroke="#D5C8FA"/>
<text x="518" y="734" fill="#7C3AED" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Use when</text>
<text x="518" y="770" fill="#6C6590" font-size="19" font-family="Inter, Segoe UI, Arial">Success depends heavily on judgment,</text>
<text x="518" y="798" fill="#6C6590" font-size="19" font-family="Inter, Segoe UI, Arial">pedagogy, architecture feel, API taste,</text>
<text x="518" y="826" fill="#6C6590" font-size="19" font-family="Inter, Segoe UI, Arial">or whether one good unit predicts many.</text>

<text x="882" y="242" fill="#0F766E" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">Review and research</text>
<rect x="882" y="278" width="296" height="86" rx="18" fill="#F2FFFA" stroke="#BDE8DB"/>
<text x="910" y="330" fill="#0F766E" font-size="23" font-family="Inter, Segoe UI, Arial">QA_GATE</text>
<rect x="882" y="388" width="296" height="86" rx="18" fill="#F2FFFA" stroke="#BDE8DB"/>
<text x="910" y="440" fill="#0F766E" font-size="23" font-family="Inter, Segoe UI, Arial">DEEP_RESEARCH_AUDIT</text>
<rect x="882" y="498" width="296" height="86" rx="18" fill="#F2FFFA" stroke="#BDE8DB"/>
<text x="910" y="550" fill="#0F766E" font-size="23" font-family="Inter, Segoe UI, Arial">MERGE_REVIEW and HARMONIZATION</text>
<rect x="882" y="612" width="296" height="260" rx="22" fill="#F2FFFA" stroke="#BDE8DB"/>
<text x="908" y="654" fill="#4E7A76" font-size="20" font-family="Inter, Segoe UI, Arial">Ask whether the work is actually</text>
<text x="908" y="682" fill="#4E7A76" font-size="20" font-family="Inter, Segoe UI, Arial">correct, actually grounded, and</text>
<text x="908" y="710" fill="#4E7A76" font-size="20" font-family="Inter, Segoe UI, Arial">actually safe to combine.</text>
<text x="908" y="752" fill="#4E7A76" font-size="19" font-family="Inter, Segoe UI, Arial">Examples: proof-gap checks, research</text>
<text x="908" y="780" fill="#4E7A76" font-size="19" font-family="Inter, Segoe UI, Arial">grounding, interface review, merge review,</text>
<text x="908" y="808" fill="#4E7A76" font-size="19" font-family="Inter, Segoe UI, Arial">and whole-branch harmonization.</text>

<text x="1272" y="242" fill="#DB2777" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">Graph control and safeguards</text>
<rect x="1272" y="278" width="326" height="86" rx="18" fill="#FFF7FB" stroke="#F1C6DD"/>
<text x="1300" y="330" fill="#7A1745" font-size="23" font-family="Inter, Segoe UI, Arial">GRAPH_REFRESH</text>
<rect x="1272" y="388" width="326" height="86" rx="18" fill="#FFF7FB" stroke="#F1C6DD"/>
<text x="1300" y="440" fill="#7A1745" font-size="23" font-family="Inter, Segoe UI, Arial">PATCH_REGRESSION_QA</text>
<rect x="1272" y="498" width="326" height="86" rx="18" fill="#FFF7FB" stroke="#F1C6DD"/>
<text x="1300" y="550" fill="#7A1745" font-size="23" font-family="Inter, Segoe UI, Arial">REWRITE_VS_PATCH_DECISION</text>
<rect x="1272" y="612" width="326" height="260" rx="22" fill="#FFF7FB" stroke="#F1C6DD"/>
<text x="1298" y="654" fill="#93637C" font-size="20" font-family="Inter, Segoe UI, Arial">Decide whether the problem is local</text>
<text x="1298" y="682" fill="#93637C" font-size="20" font-family="Inter, Segoe UI, Arial">or structural, whether the branch should</text>
<text x="1298" y="710" fill="#93637C" font-size="20" font-family="Inter, Segoe UI, Arial">keep patching, shrink back, or be</text>
<text x="1298" y="738" fill="#93637C" font-size="20" font-family="Inter, Segoe UI, Arial">recomposed entirely.</text>
<text x="1298" y="780" fill="#93637C" font-size="19" font-family="Inter, Segoe UI, Arial">This family also hosts safeguards such as</text>
<text x="1298" y="808" fill="#93637C" font-size="19" font-family="Inter, Segoe UI, Arial">DETEMPLATIZATION_QA and</text>
<text x="1298" y="836" fill="#93637C" font-size="19" font-family="Inter, Segoe UI, Arial">ADDENDUM_INTEGRATION_QA.</text>

<rect x="70" y="952" width="1560" height="38" rx="19" fill="#FFFFFF" stroke="#D7E2F4"/>
<text x="102" y="977" fill="#4F648A" font-size="18" font-family="Inter, Segoe UI, Arial">Choose node families by dominant risk: substantive execution need, calibration need, grounding need, merge sensitivity, or structural instability.</text>
</svg>