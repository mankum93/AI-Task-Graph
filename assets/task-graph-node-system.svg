xt-anchor="start" x="206.5" y="-459.1" font-family="Inter,Segoe UI,Arial" font-size="12.00" fill="#0f274f">prove, research, or synthesize.</text><text text-anchor="start" x="189.5" y="-431.7" font-family="Inter,Segoe UI,Arial" font-size="12.00" fill="#0f274f">It should report consulted standards,</text><text text-anchor="start" x="191.5" y="-418.7" font-family="Inter,Segoe UI,Arial" font-size="12.00" fill="#0f274f">evidence, merge-sensitive surfaces,</text><text text-anchor="start" x="238" y="-405.7" font-family="Inter,Segoe UI,Arial" font-size="12.00" fill="#0f274f">and structural risks.</text></g><g id="node3" class="node"><title>exw</title><path fill="#f8fbff" stroke="#cfe0f6" stroke-width="1.4" d="M726,-474C726,-474 478,-474 478,-474 472,-474 466,-468 466,-462 466,-462 466,-422 466,-422 466,-416 472,-410 478,-410 478,-410 726,-410 726,-410 732,-410 738,-416 738,-422 738,-422 738,-462 738,-462 738,-468 732,-474 726,-474"/><text text-anchor="start" x="568" y="-456.8" font-family="Inter,Segoe UI,Arial" font-weight="bold" font-size="14.00" fill="#0f274f">Use when</text><text text-anchor="start" x="478" y="-444.4" font-family="Inter,Segoe UI,Arial" font-size="12.00" fill="#0f274f">The branch already knows enough about its</text><text text-anchor="start" x="484.5" y="-432.4" font-family="Inter,Segoe UI,Arial" font-size="12.00" fill="#0f274f">standards stack, real unit, and risk profile</text><text text-anchor="start" x="556.5" y="-420.4" font-family="Inter,Segoe UI,Arial" font-size="12.00" fill="#0f274f">to do real work.</text></g><g id="node4" class="node"><title>ps</title><path fill="#fbfaff" stroke="#d5c8fa" stroke-width="1.4" d="M346,-341C346,-341 242,-341 242,-341 236,-341 230,-335 230,-329 230,-329 230,-317 230,-317 230,-311 236,-305 242,-305 242,-305 346,-305 346,-305 352,-305 358,-311 358,-317 358,-317 358,-329 358,-329 358,-335 352,-341 346,-341"/><text text-anchor="start" x="242" y="-320.3" font-family="Inter,Segoe UI,Arial" font-weight="bold" font-size="14.00" fill="#0f274f">PILOT_SAMPLE</text></g><g id="node5" class="node"><title>rr</title><path fill="#fbfaff" stroke="#d5c8fa" stroke-width="1.4" d="M716.5,-334C716.5,-334 487.5,-334 487.5,-334 481.5,-334 475.5,-328 475.5,-322 475.5,-322 475.5,-310 475.5,-310 475.5,-304 481.5,-298 487.5,-298 487.5,-298 716.5,-298 716.5,-298 722.5,-298 728.5,-304 728.5,-310 728.5,-310 728.5,-322 728.5,-322 728.5,-328 722.5,-334 716.5,-334"/><text text-anchor="start" x="487.5" y="-313.3" font-family="Inter,Segoe UI,Arial" font-weight="bold" font-size="14.00" fill="#0f274f">SCALE_OUT_READINESS_REVIEW</text></g><g id="node6" class="node"><title>cald</title><path fill="#fbfaff" stroke="#d5c8fa" stroke-width="1.4" d="M1049,-342.5C1049,-342.5 800,-342.5 800,-342.5 794,-342.5 788,-336.5 788,-330.5 788,-330.5 788,-301.5 788,-301.5 788,-295.5 794,-289.5 800,-289.5 800,-289.5 1049,-289.5 1049,-289.5 1055,-289.5 1061,-295.5 1061,-301.5 1061,-301.5 1061,-330.5 1061,-330.5 1061,-336.5 1055,-342.5 1049,-342.5"/><text text-anchor="start" x="810.5" y="-325.9" font-family="Inter,Segoe UI,Arial" font-size="12.00" fill="#0f274f">Decide whether one good sample exists</text><text text-anchor="start" x="800" y="-312.9" font-family="Inter,Segoe UI,Arial" font-size="12.00" fill="#0f274f">and whether the branch has earned broader</text><text text-anchor="start" x="885" y="-299.9" font-family="Inter,Segoe UI,Arial" font-size="12.00" fill="#0f274f">execution yet.</text></g><g id="node7" class="node"><title>calu</title><path fill="#fbfaff" stroke="#d5c8fa" stroke-width="1.4" d="M1354,-348C1354,-348 1123,-348 1123,-348 1117,-348 1111,-342 1111,-336 1111,-336 1111,-296 1111,-296 1111,-290 1117,-284 1123,-284 1123,-284 1354,-284 1354,-284 1360,-284 1366,-290 1366,-296 1366,-296 1366,-336 1366,-336 1366,-342 1360,-348 1354,-348"/><text text-anchor="start" x="1204.5" y="-330.8" font-family="Inter,Segoe UI,Arial" font-weight="bold" font-size="14.00" fill="#0f274f">Use when</text><text text-anchor="start" x="1128" y="-31