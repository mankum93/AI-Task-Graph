<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg3" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
    <stop stop-color="#07111D"/>
    <stop offset="1" stop-color="#0E2742"/>
  </linearGradient>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#020617" flood-opacity="0.3"/></filter>
</defs>
<rect width="1600" height="900" rx="30" fill="url(#bg3)"/>
<text x="72" y="88" fill="white" font-size="42" font-family="Inter, Segoe UI, Arial" font-weight="700">Node system</text>
<text x="72" y="128" fill="#ADC4E5" font-size="22" font-family="Inter, Segoe UI, Arial">The packet defines execution nodes, review nodes, and graph-control nodes for both general and writing-heavy work.</text>
<g filter="url(#cardshadow)">
  <rect x="72" y="188" width="446" height="228" rx="24" fill="#101B31" stroke="#274D79"/>
  <rect x="576" y="188" width="446" height="228" rx="24" fill="#101B31" stroke="#274D79"/>
  <rect x="1080" y="188" width="446" height="228" rx="24" fill="#101B31" stroke="#274D79"/>
  <rect x="72" y="474" width="446" height="308" rx="24" fill="#101B31" stroke="#274D79"/>
  <rect x="576" y="474" width="446" height="308" rx="24" fill="#101B31" stroke="#274D79"/>
  <rect x="1080" y="474" width="446" height="308" rx="24" fill="#101B31" stroke="#274D79"/>
</g>
<text x="104" y="236" fill="#6EE7F9" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Execution</text>
<text x="104" y="280" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• EXECUTION</text>
<text x="104" y="316" fill="#B9CDEA" font-size="19" font-family="Inter, Segoe UI, Arial">Does substantive work with built-in self-QA, evidence reporting, and interface awareness.</text>
<text x="608" y="236" fill="#A78BFA" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Calibration</text>
<text x="608" y="280" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• PILOT_SAMPLE</text>
<text x="608" y="316" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• SCALE_OUT_READINESS_REVIEW</text>
<text x="608" y="352" fill="#B9CDEA" font-size="19" font-family="Inter, Segoe UI, Arial">Proves one sample first, then decides if the graph is safe to fan out.</text>
<text x="1112" y="236" fill="#F472B6" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Research & merge</text>
<text x="1112" y="280" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• DEEP_RESEARCH_AUDIT</text>
<text x="1112" y="316" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• MERGE_REVIEW</text>
<text x="1112" y="352" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• HARMONIZATION</text>
<text x="104" y="524" fill="#FBBF24" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">General quality gates</text>
<text x="104" y="568" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• QA_GATE</text>
<text x="104" y="604" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• WHOLE_SYSTEM_COHERENCE_QA</text>
<text x="104" y="640" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• SOURCE_ALIGNMENT_QA</text>
<text x="104" y="676" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• PATCH_REGRESSION_QA</text>
<text x="104" y="712" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• REWRITE_VS_PATCH_DECISION</text>
<text x="608" y="524" fill="#34D399" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Writing-aware safeguards</text>
<text x="608" y="568" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• DETEMPLATIZATION_QA</text>
<text x="608" y="604" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• ADDENDUM_INTEGRATION_QA</text>
<text x="608" y="640" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• ASSIMILATION_BALANCE_QA</text>
<text x="608" y="676" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• META_CAPABILITY_DRIFT_ANALYSIS</text>
<text x="608" y="712" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• COVERAGE / EXAMPLES / VISUAL-TEXT / READER / BLOAT</text>
<text x="1112" y="524" fill="#60A5FA" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Graph control</text>
<text x="1112" y="568" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• GRAPH_REFRESH</text>
<text x="1112" y="604" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• Branch shrink-back when scale degrades</text>
<text x="1112" y="640" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• Parallel worker dispatch under a shared standards stack</text>
<text x="1112" y="676" fill="#E8F1FF" font-size="21" font-family="Inter, Segoe UI, Arial">• Final convergence after merge-sensitive review</text>
</svg>