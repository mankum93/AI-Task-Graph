<svg width="1700" height="1020" viewBox="0 0 1700 1020" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="1020" gradientUnits="userSpaceOnUse">
    <stop stop-color="#07111D"/><stop offset="1" stop-color="#0F2945"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#020617" flood-opacity="0.34"/>
  </filter>
</defs>
<rect width="1700" height="1020" rx="34" fill="url(#bg)"/>
<text x="72" y="92" fill="white" font-size="44" font-family="Inter, Segoe UI, Arial" font-weight="700">Node system</text>
<text x="72" y="130" fill="#AFC4E4" font-size="22" font-family="Inter, Segoe UI, Arial">The packet combines substantive execution nodes, calibration nodes, review gates, and graph-control nodes.</text>

<g filter="url(#shadow)">
  <rect x="70" y="184" width="360" height="700" rx="28" fill="#0F1A30" stroke="#28506E"/>
  <rect x="460" y="184" width="360" height="700" rx="28" fill="#0F1A30" stroke="#4F4B7B"/>
  <rect x="850" y="184" width="360" height="700" rx="28" fill="#0F1A30" stroke="#2A6E77"/>
  <rect x="1240" y="184" width="390" height="700" rx="28" fill="#0F1A30" stroke="#6A5776"/>
</g>

<text x="102" y="242" fill="#67E8F9" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">Execution &amp; synthesis</text>
<rect x="102" y="278" width="296" height="82" rx="18" fill="#132440" stroke="#2B5B88"/>
<text x="130" y="326" fill="#E8F0FF" font-size="23" font-family="Inter, Segoe UI, Arial">EXECUTION</text>
<rect x="102" y="382" width="296" height="188" rx="22" fill="#0C1628" stroke="#27466E"/>
<text x="128" y="424" fill="#CDE0FF" font-size="21" font-family="Inter, Segoe UI, Arial">Does the substantive work:</text>
<text x="128" y="458" fill="#CDE0FF" font-size="19" font-family="Inter, Segoe UI, Arial">• drafting, implementing, proving,</text>
<text x="128" y="486" fill="#CDE0FF" font-size="19" font-family="Inter, Segoe UI, Arial">  researching, or synthesizing</text>
<text x="128" y="520" fill="#CDE0FF" font-size="19" font-family="Inter, Segoe UI, Arial">• with self-QA and evidence reporting</text>
<text x="128" y="548" fill="#CDE0FF" font-size="19" font-family="Inter, Segoe UI, Arial">• without pretending local progress</text>
<text x="128" y="576" fill="#CDE0FF" font-size="19" font-family="Inter, Segoe UI, Arial">  is global convergence</text>

<rect x="102" y="610" width="296" height="218" rx="22" fill="#0C1628" stroke="#27466E"/>
<text x="128" y="652" fill="#67E8F9" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Use when</text>
<text x="128" y="688" fill="#D3E0F6" font-size="19" font-family="Inter, Segoe UI, Arial">The branch already knows enough</text>
<text x="128" y="716" fill="#D3E0F6" font-size="19" font-family="Inter, Segoe UI, Arial">about the unit, standards stack,</text>
<text x="128" y="744" fill="#D3E0F6" font-size="19" font-family="Inter, Segoe UI, Arial">and risk profile to do real work.</text>
<text x="128" y="786" fill="#D3E0F6" font-size="19" font-family="Inter, Segoe UI, Arial">Examples: implement a slice, draft a</text>
<text x="128" y="814" fill="#D3E0F6" font-size="19" font-family="Inter, Segoe UI, Arial">chapter, prove a lemma, or produce</text>
<text x="128" y="842" fill="#D3E0F6" font-size="19" font-family="Inter, Segoe UI, Arial">an evidence-backed synthesis.</text>

<text x="492" y="242" fill="#C084FC" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">Calibration</text>
<rect x="492" y="278" width="296" height="82" rx="18" fill="#181F3E" stroke="#6A52A4"/>
<text x="520" y="324" fill="#F0E9FF" font-size="23" font-family="Inter, Segoe UI, Arial">PILOT_SAMPLE</text>
<rect x="492" y="382" width="296" height="82" rx="18" fill="#181F3E" stroke="#6A52A4"/>
<text x="520" y="428" fill="#F0E9FF" font-size="23" font-family="Inter, Segoe UI, Arial">SCALE_OUT_READINESS_REVIEW</text>
<rect x="492" y="492" width="296" height="154" rx="22" fill="#0C1628" stroke="#4E4C78"/>
<text x="518" y="536" fill="#D9CDF9" font-size="20" font-family="Inter, Segoe UI, Arial">These nodes decide whether one good</text>
<text x="518" y="564" fill="#D9CDF9" font-size="20" font-family="Inter, Segoe UI, Arial">sample exists and whether the branch</text>
<text x="518" y="592" fill="#D9CDF9" font-size="20" font-family="Inter, Segoe UI, Arial">has earned broader execution yet.</text>
<text x="518" y="620" fill="#D9CDF9" font-size="20" font-family="Inter, Segoe UI, Arial">They are how the framework prevents</text>

<rect x="492" y="676" width="296" height="152" rx="22" fill="#0C1628" stroke="#4E4C78"/>
<text x="518" y="718" fill="#C084FC" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">Use when</text>
<text x="518" y="754" fill="#D3E0F6" font-size="19" font-family="Inter, Segoe UI, Arial">Success depends heavily on judgment,</text>
<text x="518" y="782" fill="#D3E0F6" font-size="19" font-family="Inter, Segoe UI, Arial">taste, pedagogy, architecture feel, or</text>
<text x="518" y="810" fill="#D3E0F6" font-size="19" font-family="Inter, Segoe UI, Arial">whether one good unit predicts twenty.</text>

<text x="882" y="242" fill="#34D399" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">Review &amp; research</text>
<rect x="882" y="278" width="296" height="82" rx="18" fill="#12243B" stroke="#2A6F78"/>
<text x="910" y="324" fill="#E8FFF9" font-size="23" font-family="Inter, Segoe UI, Arial">QA_GATE</text>
<rect x="882" y="382" width="296" height="82" rx="18" fill="#12243B" stroke="#2A6F78"/>
<text x="910" y="428" fill="#E8FFF9" font-size="23" font-family="Inter, Segoe UI, Arial">DEEP_RESEARCH_AUDIT</text>
<rect x="882" y="486" width="296" height="82" rx="18" fill="#12243B" stroke="#2A6F78"/>
<text x="910" y="532" fill="#E8FFF9" font-size="23" font-family="Inter, Segoe UI, Arial">MERGE_REVIEW / HARMONIZATION</text>
<rect x="882" y="596" width="296" height="232" rx="22" fill="#0C1628" stroke="#2A6F78"/>
<text x="908" y="638" fill="#C6EFE8" font-size="20" font-family="Inter, Segoe UI, Arial">These nodes ask whether the work is</text>
<text x="908" y="666" fill="#C6EFE8" font-size="20" font-family="Inter, Segoe UI, Arial">actually correct, actually grounded, and</text>
<text x="908" y="694" fill="#C6EFE8" font-size="20" font-family="Inter, Segoe UI, Arial">actually safe to combine. They exist to</text>
<text x="908" y="722" fill="#C6EFE8" font-size="20" font-family="Inter, Segoe UI, Arial">stop elegant-looking failure from being</text>
<text x="908" y="750" fill="#C6EFE8" font-size="20" font-family="Inter, Segoe UI, Arial">mistaken for branch health.</text>
<text x="908" y="792" fill="#C6EFE8" font-size="20" font-family="Inter, Segoe UI, Arial">Examples: proof-gap checks, research</text>
<text x="908" y="820" fill="#C6EFE8" font-size="20" font-family="Inter, Segoe UI, Arial">grounding, interface review, merge review.</text>

<text x="1272" y="242" fill="#F472B6" font-size="30" font-family="Inter, Segoe UI, Arial" font-weight="700">Graph control &amp; safeguards</text>
<rect x="1272" y="278" width="326" height="82" rx="18" fill="#291B2A" stroke="#8B4D87"/>
<text x="1300" y="324" fill="#FFE6F5" font-size="23" font-family="Inter, Segoe UI, Arial">GRAPH_REFRESH</text>
<rect x="1272" y="382" width="326" height="82" rx="18" fill="#291B2A" stroke="#8B4D87"/>
<text x="1300" y="424" fill="#FFE6F5" font-size="23" font-family="Inter, Segoe UI, Arial">PATCH_REGRESSION_QA</text>
<rect x="1272" y="486" width="326" height="82" rx="18" fill="#291B2A" stroke="#8B4D87"/>
<text x="1300" y="528" fill="#FFE6F5" font-size="23" font-family="Inter, Segoe UI, Arial">REWRITE_VS_PATCH_DECISION</text>
<rect x="1272" y="590" width="326" height="238" rx="22" fill="#0C1628" stroke="#6A5776"/>
<text x="1298" y="632" fill="#F2CCE5" font-size="20" font-family="Inter, Segoe UI, Arial">These nodes decide whether the problem</text>
<text x="1298" y="660" fill="#F2CCE5" font-size="20" font-family="Inter, Segoe UI, Arial">is local or structural, whether the branch</text>
<text x="1298" y="688" fill="#F2CCE5" font-size="20" font-family="Inter, Segoe UI, Arial">should keep patching, shrink back, or</text>
<text x="1298" y="716" fill="#F2CCE5" font-size="20" font-family="Inter, Segoe UI, Arial">recompose itself entirely. They also host</text>
<text x="1298" y="744" fill="#F2CCE5" font-size="20" font-family="Inter, Segoe UI, Arial">writing-aware safeguards such as</text>
<text x="1298" y="772" fill="#F2CCE5" font-size="20" font-family="Inter, Segoe UI, Arial">DETEMPLATIZATION_QA, ADDENDUM_</text>
<text x="1298" y="800" fill="#F2CCE5" font-size="20" font-family="Inter, Segoe UI, Arial">INTEGRATION_QA, and capability drift review.</text>

<rect x="70" y="918" width="1560" height="38" rx="19" fill="#0A1425" stroke="#27466E"/>
<text x="102" y="943" fill="#AFC4E4" font-size="18" font-family="Inter, Segoe UI, Arial">Choose node families by dominant risk: execution need, calibration need, grounding need, merge sensitivity, or structural instability.</text>
</svg>