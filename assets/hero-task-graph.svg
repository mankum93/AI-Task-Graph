0 858.5,-20 858.5,-14 864.5,-8 870.5,-8'/><text text-anchor='start' x='866.5' y='-84.8' font-family='Inter,Segoe UI,Arial' font-weight='bold' font-size='14.00' fill='#db2777'>What it protects against</text></g><g id='edge4' class='edge'><title>typing&#45;&gt;selection</title><path fill='none' stroke='#8aa2c9' stroke-width='1.8' d='M411,-186.67C411,-177.63 411,-169 411,-169 411,-169 591.42,-169 591.42,-169'/><polygon fill='#8aa2c9' stroke='#8aa2c9' stroke-width='1.8' points='591.42,-171.8 599.42,-169 591.42,-166.2 591.42,-171.8'/></g><g id='edge5' class='edge'><title>selection&#45;&gt;pathchoice</title><path fill='none' stroke='#8aa2c9' stroke-width='1.8' d='M780.57,-171C780.57,-171 848.76,-171 848.76,-171'/><polygon fill='#8aa2c9' stroke='#8aa2c9' stroke-width='1.8' points='848.76,-173.8 856.76,-171 848.76,-168.2 848.76,-173.8'/></g><g id='edge6' class='edge'><title>pathchoice&#45;&gt;safe</title><path fill='none' stroke='#8aa2c9' stroke-width='1.8' d='M1063,-150.67C1063,-141.63 1063,-133 1063,-133 1063,-133 1115.99,-133 1115.99,-133'/><polygon fill='#8aa2c9' stroke='#8aa2c9' stroke-width='1.8' points='1115.99,-135.8 1123.99,-133 1115.99,-130.2 1115.99,-135.8'/></g><g id='edge7' class='edge'><title>pathchoice&#45;&gt;unsafe</title><path fill='none' stroke='#8aa2c9' stroke-width='1.8' d='M962,-191.33C962,-200.37 962,-209 962,-209 962,-209 1143.36,-209 1143.36,-209'/><polygon fill='#8aa2c9' stroke='#8aa2c9' stroke-width='1.8' points='1143.36,-211.8 1151.36,-209 1143.36,-206.2 1143.36,-211.8'/></g><g id='node1' class='node'><title>classify</title><path fill='#f8fbff' stroke='#c8d7ee' stroke-width='1.4' d='M229,-326C229,-326 28,-326 28,-326 22,-326 16,-320 16,-314 16,-314 16,-286 16,-286 16,-280 22,-274 28,-274 28,-274 229,-274 229,-274 235,-274 241,-280 241,-286 241,-286 241,-314 241,-314 241,-320 235,-326 229,-326'/><text text-anchor='start' x='28' y='-308.8' font-family='Inter,Segoe UI,Arial' font-weight='bold' font-size='14.00' fill='#0f274f'>1. Classify the work</text><text text-anchor='start' x='28' y='-296.4' font-family='Inter,Segoe UI,Arial' font-size='12.00' fill='#0f274f'>Writing, coding, research, proof,</text><text text-anchor='start' x='28' y='-284.4' font-family='Inter,Segoe UI,Arial' font-size='12.00' fill='#0f274f'>or another mixed execution branch.</text></g><g id='node2' class='node'><title>unit</title><path fill='#f8fbff' stroke='#c8d7ee' stroke-width='1.4' d='M518,-326C518,-326 303,-326 303,-326 297,-326 291,-320 291,-314 291,-314 291,-286 291,-286 291,-280 297,-274 303,-274 303,-274 518,-274 518,-274 524,-274 530,-280 530,-286 530,-286 530,-314 530,-314 530,-320 524,-326 518,-326'/><text text-anchor='start' x='303' y='-308.8' font-family='Inter,Segoe UI,Arial' font-weight='bold' font-size='14.00' fill='#0f274f'>2. Find the real unit</text><text text-anchor='start' x='303' y='-296.4' font-family='Inter,Segoe UI,Arial' font-size='12.00' fill='#0f274f'>Chapter, feature slice, route family,</text><text text-anchor='start' x='303' y='-284.4' font-family='Inter,Segoe UI,Arial' font-size='12.00' fill='#0f274f'>lemma, scene, or another stable slice.</text></g><g id='node3' class='node'><title>shapeprove</title><path fill='#f8fbff' stroke='#c8d7ee' stroke-width='1.4' d='M788,-326C788,-326 592,-326 592,-326 586,-326 580,-320 580,-314 580,-314 580,-286 580,-286 580,-280 586,-274 592,-274 592,-274 788,-274 788,-274 794,-274 800,-280 800,-286 800,-286 800,-314 800,-314 800,-320 794,-326 788,-326'/><text text-anchor='start' x='592' y='-308.8' font-family='Inter,Segoe UI,Arial' font-weight='bold' font-size='14.00' fill='#0f274f'>3. Prove shape before scale</text><text text-anchor='start' x='592' y='-296.4' font-family='Inter,Segoe UI,Arial' font-size='12.00' fill='#0f274f'>Pilot sample plus readiness review</text><text text-anchor='start' x='629.5' y='-284.4' font-family='Inter,Segoe UI,Arial' font-size='12.00' fill='#0f274f'>block unsafe fan&#45;out.</text></g><g id='node4' class='node'><title>converge</title><path fill='#f8fbff' stroke='#c8d7ee' stroke-width='1.4' d='M1062,-326C1062,-326 862,-326 862,-326 856,-326 850,-320 850,-314 850,-314 850,-286 850,-286 850,-280 856,-274 862,-274 862,-274 1062,-274 1062,-274 1068,-274 1074,-280 1074,-286 1074,-286 1074,-314 1074,-314 1074,-320 1068,-326 1062,-326'/><text text-anchor='start' x='862' y='-308.8' font-family='Inter,Segoe UI,Arial' font-weight='bold' font-size='14.00' fill='#0f274f'>4. Converge deliberately</text><text text-anchor='start' x='862' y='-296.4' font-family='Inter,Segoe UI,Arial' font-size='12.00' fill='#0f274f'>Review, merge, harmonize, patch,</text><text text-anchor='start' x='862' y='-284.4' font-family='Inter,Segoe UI,Arial' font-size='12.00' fill='#0f274f'>or refresh when the route is wrong.</text></g><g id='node5' class='node'><title>typing</title><path fill='#fbfaff' stroke='#c8d7ee' stroke-width='1.4' d='M474,-227C474,-227 347,-227 347,-227 341,-227 335,-221 335,-215 335,-215 335,-199 335,-199 335,-193 341,-187 347,-187 347,-187 474,-187 474,-187 480,-187 486,-193 486,-199 486,-199 486,-215 486,-215 486,-221 480,-227 474,-227'/><text text-anchor='start' x='370.5' y='-209.8' font-family='Inter,Segoe UI,Arial' font-weight='bold' font-size='14.00' fill='#0f274f'>Task typing</text><text text-anchor='start' x='347' y='-197.4' font-family='Inter,Segoe UI,Arial' font-size='12.00' fill='#0f274f'>Execution physics first</text></g><g id='node6' class='node'><title>selection</title><path fill='#fbfaff' stroke='#c8d7ee' stroke-width='1.4' d='M768.5,-191C768.5,-191 611.5,-191 611.5,-191 605.5,-191 599.5,-185 599.5,-179 599.5,-179 599.5,-163 599.5,-163 599.5,-157 605.5,-151 611.5,-151 611.5,-151 768.5,-151 768.5,-151 774.5,-151 780.5,-157 780.5,-163 780.5,-163 780.5,-179 780.5,-179 780.5,-185 774.5,-191 768.5,-191'/><text text-anchor='start' x='643' y='-173.8' font-family='Inter,Segoe UI,Arial' font-weight='bold' font-size='14.00' fill='#0f274f'>Unit selection</text><text text-anchor='start' x='611.5' y='-161.4' font-family='I