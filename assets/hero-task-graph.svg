<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFCFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="heroBand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#B7C7E6" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="980" rx="34" fill="url(#bg)"/>
  <circle cx="1420" cy="110" r="170" fill="#DBEAFE"/>
  <circle cx="1320" cy="850" r="210" fill="#EDE9FE"/>
  <circle cx="190" cy="170" r="120" fill="#FCE7F3"/>

  <rect x="56" y="56" width="1488" height="190" rx="28" fill="url(#heroBand)" stroke="#D7E2F4"/>
  <text x="88" y="126" fill="#102042" font-size="50" font-family="Inter,Segoe UI,Arial" font-weight="700">AI Task Graph</text>
  <text x="88" y="168" fill="#4F648A" font-size="24" font-family="Inter,Segoe UI,Arial">Turn vague requests into governed execution graphs, calibrated samples, safe scaling, and deliberate convergence.</text>
  <rect x="88" y="190" width="214" height="40" rx="20" fill="#FFFFFF" stroke="#BFD2F3"/>
  <text x="118" y="216" fill="#2C4D93" font-size="18" font-family="Inter,Segoe UI,Arial">v08 packet included</text>
  <rect x="318" y="190" width="258" height="40" rx="20" fill="#FFFFFF" stroke="#D8C8FA"/>
  <text x="348" y="216" fill="#6B46C1" font-size="18" font-family="Inter,Segoe UI,Arial">Calibration-first scaling</text>
  <rect x="592" y="190" width="330" height="40" rx="20" fill="#FFFFFF" stroke="#C4EBDD"/>
  <text x="622" y="216" fill="#0F766E" font-size="18" font-family="Inter,Segoe UI,Arial">Refresh when the route is structural</text>

  <g filter="url(#shadow)">
    <rect x="56" y="292" width="438" height="598" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
    <rect x="532" y="292" width="520" height="598" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
    <rect x="1090" y="292" width="454" height="598" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
  </g>

  <text x="88" y="350" fill="#2563EB" font-size="30" font-family="Inter,Segoe UI,Arial" font-weight="700">What the framework does</text>
  <rect x="88" y="380" width="374" height="108" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="114" y="420" fill="#0F2554" font-size="23" font-family="Inter,Segoe UI,Arial" font-weight="700">1. Classify the work</text>
  <text x="114" y="452" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Writing, coding, research, proof,</text>
  <text x="114" y="476" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">or another mixed execution branch.</text>

  <rect x="88" y="508" width="374" height="108" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="114" y="548" fill="#0F2554" font-size="23" font-family="Inter,Segoe UI,Arial" font-weight="700">2. Find the real unit</text>
  <text x="114" y="580" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Chapter, feature slice, route family,</text>
  <text x="114" y="604" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">lemma, scene, or another stable slice.</text>

  <rect x="88" y="636" width="374" height="108" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="114" y="676" fill="#0F2554" font-size="23" font-family="Inter,Segoe UI,Arial" font-weight="700">3. Prove shape before scale</text>
  <text x="114" y="708" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Pilot sample plus readiness review</text>
  <text x="114" y="732" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">block unsafe fan-out.</text>

  <rect x="88" y="764" width="374" height="96" rx="22" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="114" y="804" fill="#0F2554" font-size="23" font-family="Inter,Segoe UI,Arial" font-weight="700">4. Converge deliberately</text>
  <text x="114" y="836" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Review, merge, harmonize, patch, or refresh.</text>

  <text x="564" y="350" fill="#7C3AED" font-size="30" font-family="Inter,Segoe UI,Arial" font-weight="700">Core execution loop</text>
  <rect x="564" y="386" width="190" height="86" rx="20" fill="#FBFAFF" stroke="#D8C8FA"/>
  <text x="594" y="420" fill="#372160" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Task typing</text>
  <text x="594" y="448" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">Execution physics first</text>

  <rect x="830" y="386" width="188" height="86" rx="20" fill="#FBFAFF" stroke="#D8C8FA"/>
  <text x="860" y="420" fill="#372160" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Unit selection</text>
  <text x="860" y="448" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">Judgeable repeatable slice</text>
  <path d="M754 429H830" stroke="#8B5CF6" stroke-width="8" stroke-linecap="round"/>

  <rect x="688" y="530" width="208" height="90" rx="20" fill="#FBFAFF" stroke="#D8C8FA"/>
  <text x="718" y="566" fill="#372160" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Pilot or direct path</text>
  <text x="718" y="594" fill="#6C6590" font-size="17" font-family="Inter,Segoe UI,Arial">Depends on subjectivity and risk</text>
  <path d="M924 472V516" stroke="#8B5CF6" stroke-width="8" stroke-linecap="round"/>

  <rect x="592" y="676" width="188" height="126" rx="22" fill="#F2FFFA" stroke="#BDE8DB"/>
  <text x="622" y="720" fill="#0F766E" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Safe to scale</text>
  <text x="622" y="752" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">Workers run under one</text>
  <text x="622" y="776" fill="#4E7A76" font-size="17" font-family="Inter,Segoe UI,Arial">shared standards stack.</text>

  <rect x="816" y="676" width="202" height="126" rx="22" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="846" y="720" fill="#7A1745" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Not safe yet</text>
  <text x="846" y="752" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">Keep calibrating or</text>
  <text x="846" y="776" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">refresh the graph.</text>
  <path d="M792 620V658" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>
  <path d="M918 620V658" stroke="#94A3B8" stroke-width="7" stroke-linecap="round"/>

  <rect x="564" y="830" width="454" height="34" rx="17" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="592" y="853" fill="#5D7397" font-size="16" font-family="Inter,Segoe UI,Arial">Every node should report standards consulted, evidence used, and structural risks discovered.</text>

  <text x="1122" y="350" fill="#DB2777" font-size="30" font-family="Inter,Segoe UI,Arial" font-weight="700">What it protects against</text>
  <rect x="1122" y="386" width="390" height="96" rx="22" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="1148" y="424" fill="#7A1745" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Templatization</text>
  <text x="1148" y="454" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">Bulk output starts strong and later collapses</text>
  <text x="1148" y="478" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">into repetition or flattening.</text>

  <rect x="1122" y="506" width="390" height="96" rx="22" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="1148" y="544" fill="#7A1745" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Addendum drift</text>
  <text x="1148" y="574" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">Revisions get stapled on instead of integrated</text>
  <text x="1148" y="598" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">into the real structure.</text>

  <rect x="1122" y="626" width="390" height="96" rx="22" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="1148" y="664" fill="#7A1745" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Capability drift</text>
  <text x="1148" y="694" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">Long-context execution drops below the</text>
  <text x="1148" y="718" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">real quality ceiling.</text>

  <rect x="1122" y="746" width="390" height="114" rx="22" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="1148" y="784" fill="#7A1745" font-size="22" font-family="Inter,Segoe UI,Arial" font-weight="700">Unsafe fan-out</text>
  <text x="1148" y="814" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">Parallel workers get launched before one</text>
  <text x="1148" y="838" fill="#93637C" font-size="17" font-family="Inter,Segoe UI,Arial">good sample has proven the output shape.</text>
</svg>