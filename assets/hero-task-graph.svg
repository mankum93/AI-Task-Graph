<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
    <stop stop-color="#0B1020"/>
    <stop offset="1" stop-color="#102B4F"/>
  </linearGradient>
  <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
    <stop stop-color="#12213D" stop-opacity="0.95"/>
    <stop offset="1" stop-color="#0D1730" stop-opacity="0.95"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#6EE7F9"/>
    <stop offset="0.5" stop-color="#A78BFA"/>
    <stop offset="1" stop-color="#F472B6"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
  </filter>
</defs>
<rect width="1600" height="900" rx="36" fill="url(#bg)"/>
<circle cx="1380" cy="120" r="180" fill="#6EE7F9" fill-opacity="0.09"/>
<circle cx="1240" cy="760" r="220" fill="#A78BFA" fill-opacity="0.08"/>
<circle cx="260" cy="160" r="160" fill="#F472B6" fill-opacity="0.08"/>
<g filter="url(#shadow)">
  <rect x="72" y="92" width="664" height="716" rx="28" fill="url(#card)" stroke="#2B406A"/>
  <rect x="780" y="92" width="748" height="716" rx="28" fill="url(#card)" stroke="#2B406A"/>
</g>
<text x="116" y="184" fill="white" font-size="64" font-family="Inter, Segoe UI, Arial" font-weight="700">AI Task Graph</text>
<text x="116" y="244" fill="#B8C6E8" font-size="28" font-family="Inter, Segoe UI, Arial">A structured framework for turning vague requests into governed execution plans,</text>
<text x="116" y="282" fill="#B8C6E8" font-size="28" font-family="Inter, Segoe UI, Arial">calibrated pilot samples, parallel worker graphs, review gates, and final convergence.</text>
<rect x="116" y="328" width="236" height="44" rx="22" fill="#0F1C36" stroke="#3B82F6"/>
<text x="148" y="357" fill="#DCE8FF" font-size="22" font-family="Inter, Segoe UI, Arial">v08 packet included</text>
<rect x="372" y="328" width="286" height="44" rx="22" fill="#0F1C36" stroke="#8B5CF6"/>
<text x="405" y="357" fill="#F1E8FF" font-size="22" font-family="Inter, Segoe UI, Arial">Calibration-first scaling</text>
<g filter="url(#shadow)">
  <rect x="108" y="430" width="278" height="120" rx="22" fill="#0F1C36" stroke="#2C4A7A"/>
  <rect x="420" y="430" width="278" height="120" rx="22" fill="#0F1C36" stroke="#2C4A7A"/>
  <rect x="108" y="592" width="278" height="120" rx="22" fill="#0F1C36" stroke="#2C4A7A"/>
  <rect x="420" y="592" width="278" height="120" rx="22" fill="#0F1C36" stroke="#2C4A7A"/>
</g>
<text x="138" y="474" fill="#D9E7FF" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">1. Classify the task</text>
<text x="138" y="510" fill="#AFC2E8" font-size="20" font-family="Inter, Segoe UI, Arial">Writing, coding, research,</text>
<text x="138" y="538" fill="#AFC2E8" font-size="20" font-family="Inter, Segoe UI, Arial">visual, or mixed-mode</text>
<text x="450" y="474" fill="#D9E7FF" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">2. Find the real unit</text>
<text x="450" y="510" fill="#AFC2E8" font-size="20" font-family="Inter, Segoe UI, Arial">Chapter, feature, proof,</text>
<text x="450" y="538" fill="#AFC2E8" font-size="20" font-family="Inter, Segoe UI, Arial">or another stable work slice</text>
<text x="138" y="636" fill="#D9E7FF" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">3. Calibrate with a pilot</text>
<text x="138" y="672" fill="#AFC2E8" font-size="20" font-family="Inter, Segoe UI, Arial">Prove one representative</text>
<text x="138" y="700" fill="#AFC2E8" font-size="20" font-family="Inter, Segoe UI, Arial">unit before fan-out</text>
<text x="450" y="636" fill="#D9E7FF" font-size="24" font-family="Inter, Segoe UI, Arial" font-weight="700">4. Scale with review</text>
<text x="450" y="672" fill="#AFC2E8" font-size="20" font-family="Inter, Segoe UI, Arial">Workers, QA gates, merges,</text>
<text x="450" y="700" fill="#AFC2E8" font-size="20" font-family="Inter, Segoe UI, Arial">refresh, and convergence</text>
<text x="828" y="164" fill="url(#accent)" font-size="36" font-family="Inter, Segoe UI, Arial" font-weight="700">What the framework protects against</text>
<g filter="url(#shadow)">
  <rect x="826" y="214" width="646" height="98" rx="20" fill="#0F1C36" stroke="#28456F"/>
  <rect x="826" y="332" width="646" height="98" rx="20" fill="#0F1C36" stroke="#28456F"/>
  <rect x="826" y="450" width="646" height="98" rx="20" fill="#0F1C36" stroke="#28456F"/>
  <rect x="826" y="568" width="646" height="98" rx="20" fill="#0F1C36" stroke="#28456F"/>
</g>
<text x="858" y="254" fill="#E7F0FF" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Templatization and late-stage quality collapse</text>
<text x="858" y="286" fill="#B6CAE8" font-size="20" font-family="Inter, Segoe UI, Arial">Especially in long writing runs, diagram families, and bulk generation.</text>
<text x="858" y="372" fill="#E7F0FF" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Addendum-style patching instead of real integration</text>
<text x="858" y="404" fill="#B6CAE8" font-size="20" font-family="Inter, Segoe UI, Arial">New material must be blended into the architecture, not stapled to the end.</text>
<text x="858" y="490" fill="#E7F0FF" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Capability drift in long-context execution</text>
<text x="858" y="522" fill="#B6CAE8" font-size="20" font-family="Inter, Segoe UI, Arial">The graph periodically checks whether the agent is underdelivering relative to potential.</text>
<text x="858" y="608" fill="#E7F0FF" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">Unsafe fan-out before the shape of good work is proven</text>
<text x="858" y="640" fill="#B6CAE8" font-size="20" font-family="Inter, Segoe UI, Arial">Parallelism is earned after a pilot sample and a scale-readiness review.</text>
<text x="828" y="760" fill="#8FB3E8" font-size="22" font-family="Inter, Segoe UI, Arial">Included packet docs: general standard, quick sheet, review doctrine, worker protocol,</text>
<text x="828" y="792" fill="#8FB3E8" font-size="22" font-family="Inter, Segoe UI, Arial">prompt templates, and domain profiles for coding, books, math, and analytical work.</text>
</svg>