<svg width="1700" height="980" viewBox="0 0 1700 980" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1700" y2="980" gradientUnits="userSpaceOnUse">
    <stop stop-color="#07111D"/><stop offset="1" stop-color="#112841"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#020617" flood-opacity="0.34"/>
  </filter>
</defs>
<rect width="1700" height="980" rx="32" fill="url(#bg)"/>
<text x="72" y="90" fill="white" font-size="44" font-family="Inter, Segoe UI, Arial" font-weight="700">Math / proof branch: dependency-sensitive graph</text>
<text x="72" y="130" fill="#ABC2E2" font-size="22" font-family="Inter, Segoe UI, Arial">Proof work is governed by target locking, definition discipline, claim dependencies, and proof-gap QA.</text>

<g filter="url(#shadow)">
  <rect x="80" y="200" width="290" height="118" rx="22" fill="#0F1B31" stroke="#26476E"/>
  <rect x="456" y="200" width="290" height="118" rx="22" fill="#0F1B31" stroke="#26476E"/>
  <rect x="832" y="200" width="300" height="118" rx="22" fill="#0F1B31" stroke="#26476E"/>
  <rect x="1218" y="200" width="330" height="118" rx="22" fill="#0F1B31" stroke="#26476E"/>
  <rect x="210" y="420" width="340" height="132" rx="22" fill="#101D35" stroke="#315074"/>
  <rect x="680" y="420" width="340" height="132" rx="22" fill="#101D35" stroke="#315074"/>
  <rect x="1150" y="420" width="340" height="132" rx="22" fill="#101D35" stroke="#315074"/>
  <rect x="520" y="660" width="320" height="124" rx="22" fill="#101D35" stroke="#315074"/>
  <rect x="960" y="660" width="320" height="124" rx="22" fill="#101D35" stroke="#315074"/>
</g>

<text x="110" y="248" fill="#6EE7F9" font-size="27" font-family="Inter, Segoe UI, Arial" font-weight="700">1. Lock theorem target</text>
<text x="110" y="282" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">Exact statement, scope, and</text>
<text x="110" y="308" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">admissible route.</text>

<text x="486" y="248" fill="#6EE7F9" font-size="27" font-family="Inter, Segoe UI, Arial" font-weight="700">2. Lock definitions</text>
<text x="486" y="282" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">Notation, conventions, allowed</text>
<text x="486" y="308" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">tools, and prior results.</text>

<text x="862" y="248" fill="#6EE7F9" font-size="27" font-family="Inter, Segoe UI, Arial" font-weight="700">3. Decompose route</text>
<text x="862" y="282" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">Claims, lemmas, cases,</text>
<text x="862" y="308" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">or proof segments.</text>

<text x="1248" y="248" fill="#6EE7F9" font-size="27" font-family="Inter, Segoe UI, Arial" font-weight="700">4. Build dependency graph</text>
<text x="1248" y="282" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">What must be proved first,</text>
<text x="1248" y="308" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">and what depends on it.</text>

<path d="M370 259H456" stroke="#67E8F9" stroke-width="8" stroke-linecap="round"/>
<path d="M746 259H832" stroke="#67E8F9" stroke-width="8" stroke-linecap="round"/>
<path d="M1132 259H1218" stroke="#67E8F9" stroke-width="8" stroke-linecap="round"/>

<path d="M492 318V380" stroke="#9DB5DB" stroke-width="6" stroke-linecap="round"/>
<path d="M928 318V380" stroke="#9DB5DB" stroke-width="6" stroke-linecap="round"/>
<path d="M1308 318V380" stroke="#9DB5DB" stroke-width="6" stroke-linecap="round"/>

<text x="246" y="468" fill="#F472B6" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">5. EXECUTION on a lemma</text>
<text x="246" y="504" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">Prove one claim with explicit dependencies.</text>
<text x="246" y="532" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">Report gaps, cases, and assumptions.</text>

<text x="716" y="468" fill="#F472B6" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">6. QA_GATE for proof gaps</text>
<text x="716" y="504" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">Check circularity, missing cases,</text>
<text x="716" y="532" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">illicit steps, and notation drift.</text>

<text x="1186" y="468" fill="#F472B6" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">7. Next dependency-ready claim</text>
<text x="1186" y="504" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">Advance only when the current claim is</text>
<text x="1186" y="532" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">actually supportable downstream.</text>

<path d="M550 486H680" stroke="#F472B6" stroke-width="8" stroke-linecap="round"/>
<path d="M1020 486H1150" stroke="#F472B6" stroke-width="8" stroke-linecap="round"/>
<path d="M850 552V626" stroke="#9DB5DB" stroke-width="6" stroke-linecap="round"/>
<path d="M1250 552V626" stroke="#9DB5DB" stroke-width="6" stroke-linecap="round"/>

<text x="550" y="708" fill="#FBBF24" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">8. HARMONIZATION</text>
<text x="550" y="744" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">Assemble local claims into one global proof route.</text>

<text x="990" y="708" fill="#34D399" font-size="28" font-family="Inter, Segoe UI, Arial" font-weight="700">9. GRAPH_REFRESH if needed</text>
<text x="990" y="744" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">Refresh when a key lemma fails or the route is structurally wrong.</text>

<rect x="70" y="824" width="500" height="102" rx="20" fill="#0B1627" stroke="#244668"/>
<text x="98" y="866" fill="#6EE7F9" font-size="23" font-family="Inter, Segoe UI, Arial" font-weight="700">Why this branch is different</text>
<text x="98" y="898" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">The central failure mode is invalid dependency logic, not stale facts or style drift.</text>

<rect x="610" y="824" width="480" height="102" rx="20" fill="#0B1627" stroke="#244668"/>
<text x="638" y="866" fill="#A78BFA" font-size="23" font-family="Inter, Segoe UI, Arial" font-weight="700">Pilot sample is optional here</text>
<text x="638" y="898" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">It appears mainly when pedagogy or proof presentation style also matters.</text>

<rect x="1130" y="824" width="500" height="102" rx="20" fill="#0B1627" stroke="#244668"/>
<text x="1158" y="866" fill="#F472B6" font-size="23" font-family="Inter, Segoe UI, Arial" font-weight="700">Proof progress must be earned</text>
<text x="1158" y="898" fill="#D5E3FA" font-size="20" font-family="Inter, Segoe UI, Arial">Plausible prose is not proof until the dependency chain survives QA.</text>
</svg>
