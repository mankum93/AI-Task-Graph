<svg width="1800" height="1040" viewBox="0 0 1800 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1040" gradientUnits="userSpaceOnUse">
    <stop stop-color="#07101B"/><stop offset="1" stop-color="#0E2742"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#020617" flood-opacity="0.34"/>
  </filter>
</defs>
<rect width="1800" height="1040" rx="32" fill="url(#bg)"/>
<text x="70" y="92" fill="white" font-size="44" font-family="Inter, Segoe UI, Arial" font-weight="700">How graph shape changes by domain</text>
<text x="70" y="132" fill="#AFC4E4" font-size="22" font-family="Inter, Segoe UI, Arial">The framework is not one fixed graph. It changes according to the execution physics of the work.</text>
<g filter="url(#shadow)">
  <rect x="60" y="190" width="390" height="780" rx="28" fill="#101B31" stroke="#1F556E"/>
  <rect x="485" y="190" width="390" height="780" rx="28" fill="#101B31" stroke="#2B4F76"/>
  <rect x="910" y="190" width="390" height="780" rx="28" fill="#101B31" stroke="#5A4680"/>
  <rect x="1335" y="190" width="405" height="780" rx="28" fill="#101B31" stroke="#6A4B6B"/>
</g>

<text x="94" y="252" fill="#6EE7F9" font-size="31" font-family="Inter, Segoe UI, Arial" font-weight="700">Writing / content</text>
<text x="519" y="252" fill="#60A5FA" font-size="31" font-family="Inter, Segoe UI, Arial" font-weight="700">Coding / implementation</text>
<text x="944" y="252" fill="#A78BFA" font-size="31" font-family="Inter, Segoe UI, Arial" font-weight="700">Research / analysis</text>
<text x="1369" y="252" fill="#F472B6" font-size="31" font-family="Inter, Segoe UI, Arial" font-weight="700">Math / proof</text>

<text x="94" y="316" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Fundamental unit</text>
<text x="94" y="350" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Chapter or scene family</text>
<text x="94" y="414" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Dominant risk</text>
<text x="94" y="448" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Templatization and late quality collapse</text>
<text x="94" y="512" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Typical shape</text>
<text x="94" y="546" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Pilot sample → writing QA</text>
<text x="94" y="574" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">→ readiness review → workers</text>
<text x="94" y="638" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Key nodes</text>
<text x="94" y="672" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">PILOT_SAMPLE</text>
<text x="94" y="702" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">DETEMPLATIZATION_QA</text>
<text x="94" y="732" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">ADDENDUM_INTEGRATION_QA</text>
<text x="94" y="762" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">WHOLE_SYSTEM_COHERENCE_QA</text>
<rect x="94" y="816" width="322" height="114" rx="20" fill="#0D1628" stroke="#264B71"/>
<text x="120" y="856" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">Parallelism is usually blocked</text>
<text x="120" y="884" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">until one real-quality sample</text>
<text x="120" y="912" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">proves the output shape.</text>

<text x="519" y="316" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Fundamental unit</text>
<text x="519" y="350" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Feature slice or subsystem seam</text>
<text x="519" y="414" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Dominant risk</text>
<text x="519" y="448" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Regression, weak interfaces, merge pain</text>
<text x="519" y="512" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Typical shape</text>
<text x="519" y="546" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Direct execution or pilot</text>
<text x="519" y="574" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">→ QA → merge review</text>
<text x="519" y="638" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Key nodes</text>
<text x="519" y="672" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">EXECUTION</text>
<text x="519" y="702" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">QA_GATE</text>
<text x="519" y="732" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">MERGE_REVIEW</text>
<text x="519" y="762" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">PATCH_REGRESSION_QA</text>
<rect x="519" y="816" width="322" height="114" rx="20" fill="#0D1628" stroke="#264B71"/>
<text x="545" y="856" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">Parallelism may be safe earlier</text>
<text x="545" y="884" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">when interfaces and merge</text>
<text x="545" y="912" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">surfaces are well understood.</text>

<text x="944" y="316" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Fundamental unit</text>
<text x="944" y="350" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Question cluster or route family</text>
<text x="944" y="414" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Dominant risk</text>
<text x="944" y="448" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Wrong framing or stale evidence</text>
<text x="944" y="512" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Typical shape</text>
<text x="944" y="546" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Question framing → research audit</text>
<text x="944" y="574" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">→ synthesis and framing check</text>
<text x="944" y="638" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Key nodes</text>
<text x="944" y="672" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">DEEP_RESEARCH_AUDIT</text>
<text x="944" y="702" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">EXECUTION synthesis</text>
<text x="944" y="732" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">QA_GATE</text>
<text x="944" y="762" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">GRAPH_REFRESH</text>
<rect x="944" y="816" width="322" height="114" rx="20" fill="#0D1628" stroke="#264B71"/>
<text x="970" y="856" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">The graph must be willing</text>
<text x="970" y="884" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">to refresh if research changes</text>
<text x="970" y="912" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">the real question.</text>

<text x="1369" y="316" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Fundamental unit</text>
<text x="1369" y="350" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Claim, lemma, or proof segment</text>
<text x="1369" y="414" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Dominant risk</text>
<text x="1369" y="448" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Hidden proof gaps and circularity</text>
<text x="1369" y="512" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Typical shape</text>
<text x="1369" y="546" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">Lock definitions → dependency graph</text>
<text x="1369" y="574" fill="#E5EEFF" font-size="22" font-family="Inter, Segoe UI, Arial">→ claim execution and QA</text>
<text x="1369" y="638" fill="#FBBF24" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="700">Key nodes</text>
<text x="1369" y="672" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">EXECUTION on lemmas</text>
<text x="1369" y="702" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">QA_GATE for proof gaps</text>
<text x="1369" y="732" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">HARMONIZATION</text>
<text x="1369" y="762" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">GRAPH_REFRESH</text>
<rect x="1369" y="816" width="336" height="114" rx="20" fill="#0D1628" stroke="#264B71"/>
<text x="1395" y="856" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">This branch is about dependency</text>
<text x="1395" y="884" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">discipline and validity, not</text>
<text x="1395" y="912" fill="#CFE2FF" font-size="20" font-family="Inter, Segoe UI, Arial">mainly about external evidence.</text>
</svg>
