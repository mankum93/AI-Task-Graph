<svg width="1800" height="1120" viewBox="0 0 1800 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1120" gradientUnits="userSpaceOnUse">
    <stop stop-color="#07111D"/><stop offset="1" stop-color="#102B49"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#020617" flood-opacity="0.34"/>
  </filter>
</defs>
<rect width="1800" height="1120" rx="32" fill="url(#bg)"/>
<text x="70" y="92" fill="white" font-size="44" font-family="Inter, Segoe UI, Arial" font-weight="700">How graph shape changes by domain</text>
<text x="70" y="132" fill="#AFC4E4" font-size="22" font-family="Inter, Segoe UI, Arial">The framework is not one fixed graph. It changes according to the dominant risks, the real unit of work, and whether scale is safe.</text>

<g filter="url(#shadow)">
  <rect x="70" y="190" width="780" height="370" rx="28" fill="#0F1A30" stroke="#28506E"/>
  <rect x="950" y="190" width="780" height="370" rx="28" fill="#0F1A30" stroke="#4F4B7B"/>
  <rect x="70" y="620" width="780" height="370" rx="28" fill="#0F1A30" stroke="#2A6E77"/>
  <rect x="950" y="620" width="780" height="370" rx="28" fill="#0F1A30" stroke="#6A5776"/>
</g>

<text x="104" y="246" fill="#67E8F9" font-size="31" font-family="Inter, Segoe UI, Arial" font-weight="700">Writing / content</text>
<text x="984" y="246" fill="#C084FC" font-size="31" font-family="Inter, Segoe UI, Arial" font-weight="700">Coding / implementation</text>
<text x="104" y="676" fill="#34D399" font-size="31" font-family="Inter, Segoe UI, Arial" font-weight="700">Research / analysis</text>
<text x="984" y="676" fill="#F472B6" font-size="31" font-family="Inter, Segoe UI, Arial" font-weight="700">Math / proof</text>

<!-- writing -->
<text x="104" y="296" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Unit</text>
<text x="164" y="296" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Chapter or scene family</text>
<text x="104" y="334" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Risk</text>
<text x="164" y="334" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Templatization and late quality collapse</text>
<text x="104" y="372" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Shape</text>
<text x="164" y="372" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Pilot sample → writing-aware QA → readiness → workers</text>
<rect x="104" y="404" width="672" height="110" rx="20" fill="#0C1628" stroke="#27466E"/>
<text x="130" y="448" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">Key nodes: PILOT_SAMPLE, DETEMPLATIZATION_QA, ADDENDUM_INTEGRATION_QA,</text>
<text x="130" y="476" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">META_CAPABILITY_DRIFT_ANALYSIS, WHOLE_SYSTEM_COHERENCE_QA</text>
<path d="M130 530H740" stroke="#67E8F9" stroke-width="8" stroke-linecap="round"/>

<!-- coding -->
<text x="984" y="296" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Unit</text>
<text x="1044" y="296" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Feature slice or subsystem seam</text>
<text x="984" y="334" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Risk</text>
<text x="1044" y="334" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Regression, weak interfaces, merge pain</text>
<text x="984" y="372" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Shape</text>
<text x="1044" y="372" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Direct execution or pilot → QA → merge review → convergence</text>
<rect x="984" y="404" width="672" height="110" rx="20" fill="#0C1628" stroke="#4F4B7B"/>
<text x="1010" y="448" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">Key nodes: EXECUTION, QA_GATE, MERGE_REVIEW, PATCH_REGRESSION_QA,</text>
<text x="1010" y="476" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">GRAPH_REFRESH when local patching no longer matches the architecture</text>
<path d="M1010 530H1620" stroke="#C084FC" stroke-width="8" stroke-linecap="round"/>

<!-- research -->
<text x="104" y="726" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Unit</text>
<text x="164" y="726" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Question cluster or route family</text>
<text x="104" y="764" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Risk</text>
<text x="164" y="764" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Wrong framing or stale evidence</text>
<text x="104" y="802" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Shape</text>
<text x="164" y="802" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Framing → research audit → synthesis → framing check</text>
<rect x="104" y="834" width="672" height="110" rx="20" fill="#0C1628" stroke="#2A6F78"/>
<text x="130" y="878" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">Key nodes: DEEP_RESEARCH_AUDIT, EXECUTION synthesis, QA_GATE, GRAPH_REFRESH</text>
<text x="130" y="906" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">The graph must stay willing to change if research changes the real question.</text>
<path d="M130 960H740" stroke="#34D399" stroke-width="8" stroke-linecap="round"/>

<!-- proof -->
<text x="984" y="726" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Unit</text>
<text x="1044" y="726" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Claim, lemma, or proof segment</text>
<text x="984" y="764" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Risk</text>
<text x="1044" y="764" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Hidden proof gaps and circular dependencies</text>
<text x="984" y="802" fill="#FBBF24" font-size="21" font-family="Inter, Segoe UI, Arial" font-weight="700">Shape</text>
<text x="1044" y="802" fill="#E5EEFF" font-size="21" font-family="Inter, Segoe UI, Arial">Lock target → dependency graph → lemma execution → proof-gap QA</text>
<rect x="984" y="834" width="672" height="110" rx="20" fill="#0C1628" stroke="#6A5776"/>
<text x="1010" y="878" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">Key nodes: EXECUTION on claims, QA_GATE for proof gaps, HARMONIZATION, GRAPH_REFRESH</text>
<text x="1010" y="906" fill="#D3E0F6" font-size="20" font-family="Inter, Segoe UI, Arial">This branch is dependency-sensitive and validity-sensitive rather than mainly evidence-sensitive.</text>
<path d="M1010 960H1620" stroke="#F472B6" stroke-width="8" stroke-linecap="round"/>
</svg>