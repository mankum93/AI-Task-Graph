<svg width="1600" height="920" viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFCFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#B7C7E6" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1600" height="920" rx="34" fill="url(#bg)"/>
  <rect x="56" y="54" width="1488" height="132" rx="26" fill="url(#band)" stroke="#D7E2F4"/>
  <text x="88" y="104" fill="#102042" font-size="42" font-family="Inter,Segoe UI,Arial" font-weight="700">How graph shape changes by domain</text>
  <text x="88" y="138" fill="#4F648A" font-size="21" font-family="Inter,Segoe UI,Arial">The framework is not one fixed graph. It changes according to dominant risks, the real unit of work, and whether scale is safe.</text>

  <g filter="url(#shadow)">
    <rect x="56" y="226" width="712" height="286" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
    <rect x="832" y="226" width="712" height="286" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
    <rect x="56" y="578" width="712" height="286" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
    <rect x="832" y="578" width="712" height="286" rx="28" fill="#FFFFFF" stroke="#D7E2F4"/>
  </g>

  <text x="84" y="282" fill="#2563EB" font-size="30" font-family="Inter,Segoe UI,Arial" font-weight="700">Writing and content</text>
  <rect x="84" y="304" width="120" height="28" rx="14" fill="#F8FBFF" stroke="#CFE0F6"/>
  <text x="108" y="323" fill="#2C4D93" font-size="15" font-family="Inter,Segoe UI,Arial">High subjectivity</text>
  <text x="84" y="364" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Unit</text>
  <text x="146" y="364" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Chapter or scene family</text>
  <text x="84" y="394" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Risk</text>
  <text x="146" y="394" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Templatization and late quality collapse</text>
  <text x="84" y="424" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Shape</text>
  <text x="146" y="424" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Pilot sample → writing-aware QA → readiness → workers</text>
  <text x="84" y="466" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Key nodes: PILOT_SAMPLE, DETEMPLATIZATION_QA,</text>
  <text x="84" y="490" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">ADDENDUM_INTEGRATION_QA, META_CAPABILITY_DRIFT_ANALYSIS,</text>
  <text x="84" y="514" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">WHOLE_SYSTEM_COHERENCE_QA</text>

  <text x="860" y="282" fill="#7C3AED" font-size="30" font-family="Inter,Segoe UI,Arial" font-weight="700">Coding and implementation</text>
  <rect x="860" y="304" width="144" height="28" rx="14" fill="#FBFAFF" stroke="#D8C8FA"/>
  <text x="884" y="323" fill="#6B46C1" font-size="15" font-family="Inter,Segoe UI,Arial">Merge-sensitive</text>
  <text x="860" y="364" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Unit</text>
  <text x="922" y="364" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Feature slice or subsystem seam</text>
  <text x="860" y="394" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Risk</text>
  <text x="922" y="394" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Regression, weak interfaces, merge pain</text>
  <text x="860" y="424" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Shape</text>
  <text x="922" y="424" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Direct execution or pilot → QA → merge review → convergence</text>
  <text x="860" y="466" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Key nodes: EXECUTION, QA_GATE, MERGE_REVIEW,</text>
  <text x="860" y="490" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">PATCH_REGRESSION_QA, GRAPH_REFRESH when local patching</text>
  <text x="860" y="514" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">no longer matches the architecture</text>

  <text x="84" y="634" fill="#0F766E" font-size="30" font-family="Inter,Segoe UI,Arial" font-weight="700">Research and analysis</text>
  <rect x="84" y="656" width="136" height="28" rx="14" fill="#F2FFFA" stroke="#BDE8DB"/>
  <text x="108" y="675" fill="#0F766E" font-size="15" font-family="Inter,Segoe UI,Arial">Evidence-heavy</text>
  <text x="84" y="716" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Unit</text>
  <text x="146" y="716" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Question cluster or route family</text>
  <text x="84" y="746" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Risk</text>
  <text x="146" y="746" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Wrong framing or stale evidence</text>
  <text x="84" y="776" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Shape</text>
  <text x="146" y="776" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Framing → research audit → synthesis → framing check</text>
  <text x="84" y="818" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Key nodes: DEEP_RESEARCH_AUDIT, EXECUTION synthesis,</text>
  <text x="84" y="842" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">QA_GATE, GRAPH_REFRESH when research changes the real question</text>

  <text x="860" y="634" fill="#DB2777" font-size="30" font-family="Inter,Segoe UI,Arial" font-weight="700">Math and proof</text>
  <rect x="860" y="656" width="164" height="28" rx="14" fill="#FFF7FB" stroke="#F1C6DD"/>
  <text x="884" y="675" fill="#BE185D" font-size="15" font-family="Inter,Segoe UI,Arial">Dependency-heavy</text>
  <text x="860" y="716" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Unit</text>
  <text x="922" y="716" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Claim, lemma, or proof segment</text>
  <text x="860" y="746" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Risk</text>
  <text x="922" y="746" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Hidden proof gaps and circular dependencies</text>
  <text x="860" y="776" fill="#B45309" font-size="18" font-family="Inter,Segoe UI,Arial" font-weight="700">Shape</text>
  <text x="922" y="776" fill="#5D7397" font-size="18" font-family="Inter,Segoe UI,Arial">Lock target → dependency graph → lemma execution → proof-gap QA</text>
  <text x="860" y="818" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">Key nodes: EXECUTION on claims, QA_GATE for proof gaps,</text>
  <text x="860" y="842" fill="#5D7397" font-size="17" font-family="Inter,Segoe UI,Arial">HARMONIZATION, GRAPH_REFRESH</text>
</svg>